<script>

// ═══════════════════════════════════════ helpers ═══════════════════════════════════════

const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const DAY=86400000;
const todayISO=()=>new Date().toISOString().slice(0,10);
const parseISO=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const addDays=(iso,n)=>{const d=parseISO(iso);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
const dateDiff=(a,b)=>Math.round((parseISO(a)-parseISO(b))/DAY);
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const fmtDate=iso=>{const d=parseISO(iso);return MON[d.getMonth()]+' '+String(d.getDate()).padStart(2,'0');};
const fmtMoney=(c,cur='INR')=>{const sym=cur==='USD'?'$':cur==='EUR'?'€':cur==='GBP'?'£':cur==='SGD'?'S$':'₹';const neg=c<0;const v=Math.abs(c)/100;
  const loc=cur==='INR'?'en-IN':'en-US';
  return (neg?'-':'')+sym+v.toLocaleString(loc,{minimumFractionDigits:2,maximumFractionDigits:2});};
const pct=(n)=>{return (n>=0?'':'')+n.toFixed(1)+'%';};

  card:'M2 8h20M2 6a2 2 0 012-2h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2z', bank:'M3 21h18M4 10h16M5 21V10M19 21V10M12 3L3 8h18z', doc:'M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8zM14 2v6h6',
};
const icon=(k,cls='w-4 h-4')=>`<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${IC[k].split('M').filter(Boolean).map(p=>`<path d="M${p}"/>`).join('')}</svg>`;

// ═══════════════════════════════════════ seed ═══════════════════════════════════════
const STORE_KEY='truebalance.v3';
let _sr=20240720;
const rnd=()=>((_sr=(_sr*1103515245+12345)&0x7fffffff)/0x7fffffff);
const pick=arr=>arr[Math.floor(rnd()*arr.length)];

const TYPE_META={
  payments:{label:'Payments',icon:'card',a:'Stripe payouts',b:'Order ledger',aKind:'Processor',bKind:'Internal'},
  bank:{label:'Bank / Cash',icon:'bank',a:'Bank statement',b:'GL cash account',aKind:'Bank',bKind:'General ledger'},
  close:{label:'Subledger → GL',icon:'doc',a:'AR subledger',b:'GL control account',aKind:'Subledger',bKind:'General ledger'},
  ar:{label:'Accounts Receivable',icon:'card',a:'Bank deposits',b:'Open invoices',aKind:'Bank',bKind:'AR ledger'},
  ap:{label:'Accounts Payable',icon:'doc',a:'Vendor bills',b:'Sent payments',aKind:'AP ledger',bKind:'Bank'},
  payroll:{label:'Payroll',icon:'bank',a:'Bank withdrawals',b:'Payroll register',aKind:'Bank',bKind:'HR system'},
  inventory:{label:'Inventory',icon:'db',a:'Goods receipts',b:'Vendor invoices',aKind:'Warehouse',bKind:'AP ledger'},
};

function ruleC(name,enabled,priority,ref,amount,date,confidence){return {id:uid('rl'),name,enabled,priority,cond:{ref,amount,date},confidence};}

const _MERCH=['Aster Goods','Volt Mobility','Nook Living','Pax Athletics','Ember Coffee','Rune Studio','Halo Beauty','Tidewell','Marrow & Co','Sable Home'];
const _CUST=['Northwind LLC','Acme Retail','Vertex Health','Blue Owl','Cirrus Foods','Delta Labs','Onyx Media','Pinebrook','Quill & Co','Summit Gear'];
const _VEND=['AWS','Cloudflare','WeWork','Staples','Gusto','Slack','FedEx','Adobe','Ramp','Notion'];
const _OPS=['Payroll Run','AWS','Stripe Payout','Office Lease','Gusto','Vendor ACH','Wire — Meridian','Refund Batch','Tax Authority','Insurance'];
const TYPE_GEN={
  payments:{refP:'ch_',timing:false,cos:_MERCH,memos:['Card charge','Subscription','One-time'],kindA:'charge',kindB:'order',
    aOnly:[{sign:-1,lo:40,hi:160,memo:'Customer refund',kind:'refund'},{sign:-1,lo:15,hi:45,memo:'Processing fee',kind:'fee'},{sign:-1,lo:80,hi:280,memo:'Chargeback',kind:'chargeback'}],
    bOnly:[{lo:90,hi:350,memo:'Payment in transit',kind:'in-transit'},{lo:45,hi:165,memo:'Payout pending',kind:'in-transit'}]},
  bank:{refP:'TX',timing:true,cos:_OPS,memos:['ACH debit','Wire in','Card settlement','Deposit'],kindA:'bank-line',kindB:'gl-entry',
    aOnly:[{sign:-1,lo:12,hi:32,memo:'Bank service fee',kind:'bank-fee'},{sign:1,lo:3,hi:12,memo:'Interest earned',kind:'interest'}],
    bOnly:[{lo:300,hi:800,memo:'Deposit in transit',kind:'in-transit'},{lo:150,hi:400,memo:'Outstanding check',kind:'outstanding'}]},
  close:{refP:'INV-',timing:false,cos:_CUST,memos:['Invoice','Credit memo','Posting'],kindA:'gl-post',kindB:'invoice',
    aOnly:[{lo:200,hi:500,memo:'Unapplied cash',kind:'unapplied'}],
    bOnly:[{lo:120,hi:300,memo:'Invoice not posted',kind:'noreceipt'},{lo:70,hi:160,memo:'Timing — next period',kind:'timing'}]},
  ar:{refP:'INV-',timing:false,cos:_CUST,memos:['Invoice payment','Wire','ACH'],kindA:'deposit',kindB:'invoice',
    aOnly:[{lo:100,hi:400,memo:'Unapplied cash',kind:'unapplied'}],
    bOnly:[{lo:200,hi:600,memo:'Overdue >60 days',kind:'overdue'},{lo:120,hi:320,memo:'Disputed invoice',kind:'dispute'}]},
  ap:{refP:'BILL-',timing:false,cos:_VEND,memos:['Vendor payment','ACH','Wire'],kindA:'bill',kindB:'payment',
    aOnly:[{lo:150,hi:520,memo:'Bill awaiting payment',kind:'unpaid'}],
    bOnly:[{lo:80,hi:220,memo:'Payment, no matching bill',kind:'nobill'}]},
  payroll:{refP:'PR-',timing:false,cos:['Payroll — Engineering','Payroll — Sales','Payroll — Operations','Payroll — G&A','Payroll — Design'],memos:['Net pay','Benefits','401(k)'],kindA:'withdrawal',kindB:'register',
    aOnly:[{sign:-1,lo:20,hi:60,memo:'Bank wire fee',kind:'bank-fee'}],
    bOnly:[{lo:200,hi:450,memo:'Tax withholding — unbooked',kind:'tax'},{lo:120,hi:300,memo:'Reimbursement pending',kind:'reimb'}]},
  inventory:{refP:'GRN-',timing:false,cos:_VEND,memos:['Goods receipt','Delivery','Return'],kindA:'receipt',kindB:'invoice',
    aOnly:[{sign:-1,lo:50,hi:160,memo:'Shrinkage / damage',kind:'shrinkage'}],
    bOnly:[{lo:100,hi:320,memo:'Invoice, no goods receipt',kind:'noreceipt'}]},
};
const RULESET={
  payments:()=>[ruleC('Exact PSP reference',true,1,'exact',{mode:'exact',value:0},{days:2},99),ruleC('Amount + close date',true,2,'off',{mode:'exact',value:0},{days:1},88),ruleC('Fee-tolerant (±1.5%)',true,3,'fuzzy',{mode:'pct',value:1.5},{days:3},78)],
  bank:()=>[ruleC('Reference + amount',true,1,'exact',{mode:'exact',value:0},{days:3},98),ruleC('Amount + date window',true,2,'off',{mode:'exact',value:0},{days:2},90),ruleC('Rounding tolerant (±$0.50)',true,3,'off',{mode:'abs',value:50},{days:5},75)],
  close:()=>[ruleC('Invoice number match',true,1,'exact',{mode:'exact',value:0},{days:5},99),ruleC('Amount + posting date',true,2,'off',{mode:'exact',value:0},{days:5},85),ruleC('Amount tolerant (±1%)',true,3,'fuzzy',{mode:'pct',value:1},{days:7},70)],
  ar:()=>[ruleC('Invoice number match',true,1,'exact',{mode:'exact',value:0},{days:4},99),ruleC('Amount + deposit date',true,2,'off',{mode:'exact',value:0},{days:2},88),ruleC('Partial-payment tolerant (±2%)',true,3,'fuzzy',{mode:'pct',value:2},{days:5},72)],
  ap:()=>[ruleC('Bill number match',true,1,'exact',{mode:'exact',value:0},{days:5},99),ruleC('Amount + payment date',true,2,'off',{mode:'exact',value:0},{days:3},88),ruleC('Early-pay discount (±2%)',true,3,'fuzzy',{mode:'pct',value:2},{days:5},72)],
  payroll:()=>[ruleC('Batch reference',true,1,'exact',{mode:'exact',value:0},{days:2},98),ruleC('Amount + pay date',true,2,'off',{mode:'exact',value:0},{days:1},90),ruleC('Net-of-fee tolerant (±$1)',true,3,'off',{mode:'abs',value:100},{days:3},75)],
  inventory:()=>[ruleC('GRN ↔ invoice number',true,1,'exact',{mode:'exact',value:0},{days:7},99),ruleC('Amount + receipt date',true,2,'off',{mode:'exact',value:0},{days:5},86),ruleC('Qty variance tolerant (±3%)',true,3,'fuzzy',{mode:'pct',value:3},{days:7},70)],
};
const CADENCE={payments:'Daily',bank:'Daily',close:'Monthly',ar:'Daily',ap:'Weekly',payroll:'Per pay run',inventory:'Monthly'};
function genThreeway(){const v=_VEND.slice(0,6);const out=[];for(let i=0;i<5;i++){const amt=Math.round((20000+rnd()*180000)*100);
  const gr=i===2?null:amt;const inv=i===3?Math.round(amt*1.045):amt;
  out.push({po:'PO-'+(4000+Math.floor(rnd()*5999)),vendor:pick(v),poAmt:amt,grAmt:gr,invAmt:inv,status:gr==null?'missing-gr':(inv!==amt?'variance':'matched')});}return out;}
function genTax(){const j=[['Federal income',1],['State — CA',1],['FICA / Medicare',1],['State — NY',0]];
  return j.map(([jur,ok])=>{const accrued=Math.round((300000+rnd()*900000)*100);const paid=ok?accrued:Math.round(accrued*0.88);return {jur,accrued,paid,status:accrued===paid?'ok':'variance'};});}

function genRecords(recId, type){
  const g=TYPE_GEN[type]||TYPE_GEN.close; const A=[], B=[]; const T=todayISO(); let n=0;
  const push=(side,o)=>{(side==='A'?A:B).push(Object.assign({id:`${recId}-${side}-${++n}`,recId,side,currency:'INR',resolution:null},o));};
  const mkref=()=>g.refP+(10000+Math.floor(rnd()*89999));
  // ── clean matched pairs (bulk) ──
  const NP = 22;
  for(let i=0;i<NP;i++){
    const co=pick(g.cos); const amt=Math.round((5000+rnd()*95000)*100); const ref=mkref();
    const d=addDays(T,-Math.floor(rnd()*20)-1);
    const dB = g.timing? addDays(d,-1) : (rnd()<0.3? addDays(d,-1):d);
    push('B',{date:dB,amount:amt,reference:ref,counterparty:co,memo:pick(g.memos),kind:g.kindB});
    push('A',{date:d,amount:amt,reference:ref,counterparty:co,memo:pick(g.memos),kind:g.kindA});
  }
  // ── near-match: amount off ~0.9% (only matches once amount tolerance is loosened → suggested) ──
  const nco=pick(g.cos), namt=Math.round((25000+rnd()*75000)*100), nref=mkref(), nd=addDays(T,-4);
  push('B',{date:nd,amount:namt,reference:nref,counterparty:nco,memo:pick(g.memos),kind:g.kindB});
  push('A',{date:nd,amount:Math.round(namt*0.991),reference:nref,counterparty:nco,memo:pick(g.memos),kind:g.kindA});
  // ── wide-date, no shared reference → stays a break unless a rule widens the window ──
  const wco=pick(g.cos), wamt=Math.round((12000+rnd()*40000)*100);
  push('B',{date:addDays(T,-12),amount:wamt,reference:'',counterparty:wco,memo:pick(g.memos),kind:g.kindB});
  push('A',{date:addDays(T,-8),amount:wamt,reference:mkref(),counterparty:wco,memo:pick(g.memos),kind:g.kindA});
  // ── one-sided breaks (domain specific) ──
  g.aOnly.forEach(o=>push('A',{date:addDays(T,-Math.floor(rnd()*8)-1),reference:mkref(),counterparty:pick(g.cos),
    amount:(o.sign||1)*Math.round((o.lo+rnd()*(o.hi-o.lo))*10000),memo:o.memo,kind:o.kind}));
  g.bOnly.forEach(o=>push('B',{date:addDays(T,-Math.floor(rnd()*6)-1),reference:'',counterparty:pick(g.cos),
    amount:(o.sign||1)*Math.round((o.lo+rnd()*(o.hi-o.lo))*10000),memo:o.memo,kind:o.kind}));
  return {A,B};
}

function buildRec(type, name, owner){
  const recId=uid('rec');
  const {A,B}=genRecords(recId,type);
  const rules=(RULESET[type]||RULESET.close)();
  const rec={id:recId,type,name,owner,cadence:CADENCE[type]||'Monthly',threshold:85,
    rules, records:A.concat(B), confirmed:[], rejected:[], lastRun:null};
  if(type==='ap'||type==='inventory') rec.threeway=genThreeway();
  if(type==='payroll') rec.tax=genTax();
  return rec;
}

function seed(){
  _sr=20240720;_uid=0;
  const recs=[
    buildRec('payments','Stripe Payouts ↔ Orders','Priya Nair'),
    buildRec('bank','Operating Bank ↔ GL Cash','Marcus Feld'),
    buildRec('ar','Customer Payments ↔ AR','Priya Nair'),
    buildRec('ap','Vendor Bills ↔ Payments','Marcus Feld'),

    buildRec('inventory','Goods Receipt ↔ Invoices','Sam Whitlock'),
    buildRec('close','AR Subledger ↔ GL','Priya Nair'),
  ];
  recs.forEach(r=>{const res=engine(r);r.lastRun={at:addDays(todayISO(),-1)+'T18:20',rate:res.rate,matched:res.matched.length,breaks:res.breaks.length,history:seedTrend(res.rate)};});
  const acct=(name,institution,kind,currency,balance,status,sync,feed)=>({id:uid('ac'),name,institution,kind,currency,balance,status,sync,feed});

// ═══════════════════════════════════════ matching engine ═══════════════════════════════════════
function normRef(s){return (s||'').toLowerCase().replace(/[^a-z0-9]/g,'');}
function fuzzyRef(a,b){a=normRef(a);b=normRef(b);if(!a||!b)return false;if(a===b)return true;
  if(a.length>=5&&b.length>=5&&(a.includes(b)||b.includes(a)))return true;
  return a.slice(-5)===b.slice(-5);}
function evalPair(a,b,c){
  if(c.ref==='exact'){if(!a.reference||a.reference!==b.reference)return false;}
  else if(c.ref==='fuzzy'){if(!fuzzyRef(a.reference,b.reference))return false;}
  const diff=Math.abs(Math.abs(a.amount)-Math.abs(b.amount));
  if(c.amount.mode==='exact'){if(diff!==0)return false;}
  else if(c.amount.mode==='abs'){if(diff>c.amount.value)return false;}
  else if(c.amount.mode==='pct'){if(diff>(c.amount.value/100)*Math.max(Math.abs(a.amount),Math.abs(b.amount)))return false;}
  if(Math.abs(dateDiff(a.date,b.date))>c.date.days)return false;
  return true;
}
function engine(rec){
  const live=rec.records.filter(r=>!r.resolution);
  const A=live.filter(r=>r.side==='A'), B=live.filter(r=>r.side==='B');
  const usedA=new Set(), usedB=new Set(), matches=[];
  const rejected=new Set((rec.rejected||[]).map(p=>p.aId+'|'+p.bId));
  // 1) manual confirmed matches first
  (rec.confirmed||[]).forEach(p=>{const a=A.find(x=>x.id===p.aId),b=B.find(x=>x.id===p.bId);
    if(a&&b&&!usedA.has(a.id)&&!usedB.has(b.id)){usedA.add(a.id);usedB.add(b.id);matches.push({aId:a.id,bId:b.id,ruleId:'manual',ruleName:'Manual match',confidence:100});}});
  // 2) rules in priority order
  rec.rules.filter(r=>r.enabled).slice().sort((x,y)=>x.priority-y.priority).forEach(rule=>{
    A.forEach(a=>{ if(usedA.has(a.id))return; let best=null,bs=Infinity;
      B.forEach(b=>{ if(usedB.has(b.id))return; if(rejected.has(a.id+'|'+b.id))return;
        if(evalPair(a,b,rule.cond)){const sc=Math.abs(Math.abs(a.amount)-Math.abs(b.amount))*100+Math.abs(dateDiff(a.date,b.date));if(sc<bs){bs=sc;best=b;}}});
      if(best){usedA.add(a.id);usedB.add(best.id);matches.push({aId:a.id,bId:best.id,ruleId:rule.id,ruleName:rule.name,confidence:rule.confidence});}
    });
  });
  const matched=matches.filter(m=>m.confidence>=rec.threshold);
  const suggested=matches.filter(m=>m.confidence<rec.threshold);
  const mSet=new Set(); matched.forEach(m=>{mSet.add(m.aId);mSet.add(m.bId);});
  const sSet=new Set(); suggested.forEach(m=>{sSet.add(m.aId);sSet.add(m.bId);});
  const breaks=live.filter(r=>!mSet.has(r.id)&&!sSet.has(r.id));
  const resolved=rec.records.filter(r=>r.resolution);
  const total=live.length;
  const rate= total? +( (matched.length*2) / total *100 ).toFixed(1):100;
  const matchedVal=matched.reduce((s,m)=>{const a=rec.records.find(r=>r.id===m.aId);return s+Math.abs(a?a.amount:0);},0);
  const breakVal=breaks.reduce((s,r)=>s+Math.abs(r.amount),0);
  return {A,B,matches,matched,suggested,breaks,resolved,rate,matchedVal,breakVal,total,
    perRule: rec.rules.map(rl=>({rule:rl,count:matches.filter(m=>m.ruleId===rl.id).length}))};
}

function getEntity(id){return (DB.entities||[]).find(e=>e.id===id);}
function icEngine(){
  const t=(DB.icTxns||[]).map(x=>{const delta=x.apINR==null?null:Math.abs(x.arINR-x.apINR);
    let status=x.apINR==null?'unmatched':(delta<=Math.round(x.arINR*0.01)?'matched':'mismatch');
    if(x.eliminated)status='eliminated';
    return {...x,delta,status};});
  const by=s=>t.filter(x=>x.status===s);
  const elimValue=by('eliminated').reduce((s,x)=>s+x.arINR,0);
  const readyValue=by('matched').reduce((s,x)=>s+x.arINR,0);
  return {t,matched:by('matched'),eliminated:by('eliminated'),mismatch:by('mismatch'),unmatched:by('unmatched'),elimValue,readyValue};
}

      <table class="w-full text-[13px]"><thead>
        <tr class="text-left lbl border-b border-line">

          <th class="font-semibold px-3 py-2">Trend</th><th class="font-semibold px-3 py-2 text-right">Breaks</th>
          <th class="font-semibold px-3 py-2 text-right">Value at risk</th><th class="w-8"></th></tr></thead><tbody>
        ${all.map(({rc,res})=>`<tr class="border-b border-line-soft row-hover cursor-pointer" data-act="open-recon" data-id="${rc.id}">
          <td class="px-4 py-2.5"><div class="font-semibold">${esc(rc.name)}</div><div class="text-[11px] text-faint">Owner · ${esc(rc.owner)}</div></td>
          <td class="px-3 py-2.5"><span class="chip">${typeGlyph(rc.type,'w-3.5 h-3.5')}${TYPE_META[rc.type].label}</span></td>
          <td class="px-3 py-2.5 text-muted">${rc.cadence}</td>
          <td class="px-3 py-2.5 text-right"><span class="mono font-semibold ${res.rate>=95?'text-ok-ink':res.rate>=80?'text-ink':'text-warn-ink'}">${res.rate.toFixed(1)}%</span></td>
          <td class="px-3 py-2.5">${rc.lastRun?spark(rc.lastRun.history):''}</td>
          <td class="px-3 py-2.5 text-right">${res.breaks.length?`<span class="mono font-semibold text-warn-ink">${res.breaks.length}</span>`:`<span class="mono text-faint">0</span>`}</td>
          <td class="px-3 py-2.5 text-right mono ${res.breakVal?'text-ink-soft':'text-faint'}">${fmtMoney(res.breakVal)}</td>
          <td class="px-2 text-faint">${icon('chevR','w-4 h-4')}</td></tr>`).join('')}

  return inner;
}

// ═══════════════════════════════════════ view: reconciliation ═══════════════════════════════════════
const RECON_TABS=[['overview','Overview'],['rules','Rules Studio'],['matches','Matches'],['exceptions','Exceptions'],['sources','Sources']];
function viewRecon(){
  const rec=getRec(DB.route.recId); if(!rec)return viewDashboard();
  const tab=DB.route.tab||'overview';
  const res=engine(rec);
  const meta=TYPE_META[rec.type];
  const runBtn=`<button data-act="run-recon" data-id="${rec.id}" class="btn btn-primary">${icon('play','w-4 h-4')}Run reconciliation</button>`;
  const lastRun=rec.lastRun?`<span class="text-[11.5px] text-muted mono">last run ${rec.lastRun.at.replace('T',' ')}</span>`:'';
  let body='';
  if(tab==='overview') body=reconOverview(rec,res);
  else if(tab==='rules') body=reconRules(rec,res);
  else if(tab==='matches') body=reconMatches(rec,res);
  else if(tab==='exceptions') body=reconExceptions(rec,res);
  else if(tab==='sources') body=reconSources(rec,res);
  return topbar(esc(rec.name),`${meta.a} <span class="text-faint">↔</span> ${meta.b} · ${rec.cadence}`,`${lastRun}${runBtn}`)
    +`<div class="flex-none px-6 border-b border-line bg-surface flex items-center gap-1">
      ${RECON_TABS.map(([k,l])=>`<button data-act="recon-tab" data-t="${k}" class="h-10 px-3 text-[13px] font-medium border-b-2 -mb-px transition ${tab===k?'border-accent text-accent-ink':'border-transparent text-muted hover:text-ink'}">${l}${k==='exceptions'&&res.breaks.length?` <span class="mono text-[11px] text-warn-ink">${res.breaks.length}</span>`:''}</button>`).join('')}
    </div><div class="flex-1 overflow-y-auto fade-in">${body}</div>`;
}

function twistCard(rec,res){
  if(rec.type==='ar'){
    const inv=rec.records.filter(r=>r.side==='B');const T=todayISO();
    const buck=[['Current',0,30,0],['31–60 days',31,60,0],['61–90 days',61,90,0],['90+ days',91,99999,0]];
    inv.forEach(r=>{const age=Math.abs(dateDiff(T,r.date));const b=buck.find(x=>age>=x[1]&&age<=x[2]);if(b)b[3]+=Math.abs(r.amount);});
    return `<div class="col-span-3 card overflow-hidden"><div class="px-4 h-11 flex items-center border-b border-line"><div class="font-semibold text-[13px]">Invoice aging</div><div class="ml-auto text-[11.5px] text-muted">Open receivables by age · disputes routed to Exceptions</div></div>
      <div class="grid grid-cols-4 divide-x divide-line">${buck.map(([l,,,v],i)=>`<div class="p-4"><div class="lbl">${l}</div><div class="mono text-[20px] font-semibold mt-1 ${i>=2?'text-warn-ink':''}">${fmtMoney(v)}</div></div>`).join('')}</div></div>`;
  }
  if(rec.type==='payroll'&&rec.tax){
    return `<div class="col-span-3 card overflow-hidden"><div class="px-4 h-11 flex items-center border-b border-line"><div class="font-semibold text-[13px]">Tax liabilities</div><div class="ml-auto text-[11.5px] text-muted">Accrued vs. paid by jurisdiction</div></div>
      <table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line"><th class="px-4 py-2 font-semibold">Jurisdiction</th><th class="px-3 py-2 font-semibold text-right">Accrued</th><th class="px-3 py-2 font-semibold text-right">Paid</th><th class="px-3 py-2 font-semibold text-right">Variance</th><th class="px-4 py-2 font-semibold">Status</th></tr></thead><tbody>
      ${rec.tax.map(t=>`<tr class="border-b border-line-soft"><td class="px-4 py-2.5 font-medium">${t.jur}</td><td class="px-3 py-2.5 text-right mono">${fmtMoney(t.accrued)}</td><td class="px-3 py-2.5 text-right mono">${fmtMoney(t.paid)}</td><td class="px-3 py-2.5 text-right mono ${t.accrued-t.paid?'text-warn-ink':'text-faint'}">${fmtMoney(t.accrued-t.paid)}</td><td class="px-4 py-2.5">${t.status==='ok'?'<span class="text-ok-ink text-[12px] font-medium">Reconciled</span>':'<span class="text-warn-ink text-[12px] font-medium">Variance</span>'}</td></tr>`).join('')}
      </tbody></table></div>`;
  }
  if((rec.type==='ap'||rec.type==='inventory')&&rec.threeway){
    return `<div class="col-span-3 card overflow-hidden"><div class="px-4 h-11 flex items-center border-b border-line"><div class="font-semibold text-[13px]">Three-way match</div><div class="ml-auto text-[11.5px] text-muted">Purchase order · goods receipt · vendor invoice</div></div>
      <table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line"><th class="px-4 py-2 font-semibold">PO</th><th class="px-3 py-2 font-semibold">Vendor</th><th class="px-3 py-2 font-semibold text-right">PO amt</th><th class="px-3 py-2 font-semibold text-right">Received</th><th class="px-3 py-2 font-semibold text-right">Invoiced</th><th class="px-4 py-2 font-semibold">Status</th></tr></thead><tbody>
      ${rec.threeway.map(t=>`<tr class="border-b border-line-soft"><td class="px-4 py-2.5 mono">${t.po}</td><td class="px-3 py-2.5 font-medium">${esc(t.vendor)}</td>
        <td class="px-3 py-2.5 text-right mono">${fmtMoney(t.poAmt)}</td>
        <td class="px-3 py-2.5 text-right mono ${t.grAmt==null?'text-bad-ink':''}">${t.grAmt==null?'— missing':fmtMoney(t.grAmt)}</td>
        <td class="px-3 py-2.5 text-right mono ${t.invAmt!==t.poAmt?'text-warn-ink':''}">${fmtMoney(t.invAmt)}</td>
        <td class="px-4 py-2.5">${t.status==='matched'?'<span class="text-ok-ink text-[12px] font-medium">3-way matched</span>':t.status==='missing-gr'?'<span class="text-bad-ink text-[12px] font-medium">Missing receipt</span>':'<span class="text-warn-ink text-[12px] font-medium">Price variance</span>'}</td></tr>`).join('')}
      </tbody></table></div>`;
  }
  return '';
}
function reconOverview(rec,res){
  const auto=res.matches.length?Math.round(res.matched.length/res.matches.length*100):0;
  return `<div class="p-6 grid grid-cols-3 gap-5">
    <div class="card p-5 flex flex-col items-center justify-center">${matchRing(res.rate,148)}
      <div class="mt-3 text-[12px] text-muted text-center">${res.matched.length} of ${res.total} items matched</div></div>
    <div class="col-span-2 grid grid-cols-2 gap-3 content-start">
      ${kpi('Matched',res.matched.length,fmtMoney(res.matchedVal)+' reconciled')}
      ${kpi('Suggested',res.suggested.length,'below '+rec.threshold+'% confidence')}
      ${kpi('Breaks',res.breaks.length,fmtMoney(res.breakVal)+' at risk')}
      ${kpi('Auto-match',auto+'%','no human touch')}
    </div>
    ${twistCard(rec,res)}
    <div class="col-span-3 card overflow-hidden">
      <div class="flex items-center px-4 h-11 border-b border-line"><div class="font-semibold text-[13px]">Rule performance</div>

      <table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line">
        <th class="px-4 py-2 font-semibold">#</th><th class="px-3 py-2 font-semibold">Rule</th>
        <th class="px-3 py-2 font-semibold">Conditions</th><th class="px-3 py-2 font-semibold text-right">Confidence</th>
        <th class="px-3 py-2 font-semibold text-right">Matched</th><th class="px-3 py-2 font-semibold">Status</th></tr></thead><tbody>
        ${res.perRule.map(({rule,count})=>`<tr class="border-b border-line-soft">
          <td class="px-4 py-2.5 mono text-faint">${rule.priority}</td>
          <td class="px-3 py-2.5 font-medium">${esc(rule.name)}</td>
          <td class="px-3 py-2.5">${condChips(rule.cond)}</td>
          <td class="px-3 py-2.5 text-right">${confBar(rule.confidence)}</td>
          <td class="px-3 py-2.5 text-right mono font-semibold">${count}</td>
          <td class="px-3 py-2.5">${rule.enabled?'<span class="text-ok-ink text-[12px] font-medium">● Active</span>':'<span class="text-faint text-[12px]">○ Off</span>'}</td></tr>`).join('')}
      </tbody></table></div></div>`;
}
function condChips(c){
  const out=[];
  out.push(`<span class="chip">Ref: ${c.ref==='exact'?'exact':c.ref==='fuzzy'?'fuzzy':'ignore'}</span>`);
  out.push(`<span class="chip">Amt: ${c.amount.mode==='exact'?'exact':c.amount.mode==='pct'?'±'+c.amount.value+'%':'±'+fmtMoney(c.amount.value)}</span>`);
  out.push(`<span class="chip">Date: ±${c.date.days}d</span>`);
  return `<span class="flex flex-wrap gap-1.5">${out.join('')}</span>`;
}

// ── HERO: Rules Studio ──
function reconRules(rec,res){
  const base=rec.lastRun?rec.lastRun.rate:res.rate;
  const delta=+(res.rate-base).toFixed(1);
  const dirty = !rec.lastRun || Math.abs(delta)>0.05 || engineChanged(rec);
  return `<div class="flex h-full">
    <div class="flex-1 min-w-0 overflow-y-auto p-6">
      <div class="flex items-center mb-4"><div><div class="font-semibold text-[14px]">Match rules</div>
        <div class="text-[12px] text-muted">Evaluated top-to-bottom. The first rule that matches a pair wins.</div></div>
        <button data-act="add-rule" data-id="${rec.id}" class="ml-auto btn btn-ghost btn-sm">${icon('plus','w-3.5 h-3.5')}Add rule</button></div>
      <div class="space-y-2.5">
        ${rec.rules.slice().sort((a,b)=>a.priority-b.priority).map((rl,i,arr)=>ruleCard(rec,rl,i,arr.length,res)).join('')}
      </div>
      <div class="mt-5 card p-4">
        <div class="flex items-center gap-3"><div class="lbl">Auto-match threshold</div>
          <div class="mono text-[13px] font-semibold text-accent-ink ml-auto">${rec.threshold}%</div></div>
        <input type="range" min="50" max="100" value="${rec.threshold}" data-thresh="${rec.id}" class="w-full mt-3">
        <div class="text-[11.5px] text-muted mt-2">Matches at or above ${rec.threshold}% confidence are auto-applied; below become <span class="text-warn-ink font-medium">suggested</span> for review.</div>
      </div>
    </div>
    <div class="w-[300px] flex-none border-l border-line bg-surface overflow-y-auto p-5">
      <div class="lbl mb-3">Live simulation</div>
      <div class="flex flex-col items-center">${matchRing(res.rate,140)}</div>
      <div class="mt-3 flex items-center justify-center gap-2 text-[12.5px]">
        <span class="text-muted">vs last run</span>
        <span class="mono font-semibold ${delta>0?'text-ok-ink':delta<0?'text-bad-ink':'text-faint'}">${delta>0?'+':''}${delta}%</span></div>
      <div class="mt-5 space-y-2">
        ${simStat('Matched',res.matched.length,'ok')}
        ${simStat('Suggested',res.suggested.length,'warn')}
        ${simStat('Breaks',res.breaks.length,'bad')}
        ${simStat('Value at risk',fmtMoney(res.breakVal),'muted')}
      </div>
      <div class="mt-5 pt-4 border-t border-line">
        ${dirty?`<button data-act="run-recon" data-id="${rec.id}" class="btn btn-primary w-full justify-center">${icon('play','w-4 h-4')}Apply & run</button>
          <button data-act="revert-rules" data-id="${rec.id}" class="btn btn-ghost btn-sm w-full justify-center mt-2">Discard changes</button>`
          :`<div class="text-[12px] text-muted text-center flex items-center justify-center gap-1.5">${icon('check','w-4 h-4 text-ok')}In sync with last run</div>`}
      </div>
      <div class="mt-5 lbl mb-2">Matched by rule</div>
      <div class="space-y-1.5">${res.perRule.filter(p=>p.count).map(({rule,count})=>`<div class="flex items-center gap-2 text-[12px]"><span class="w-1.5 h-1.5 rounded-full ${rule.enabled?'bg-accent':'bg-faint'}"></span><span class="flex-1 truncate text-ink-soft">${esc(rule.name)}</span><span class="mono text-faint">${count}</span></div>`).join('')||'<div class="text-[12px] text-faint">No matches yet</div>'}</div>
    </div></div>`;
}
function simStat(l,v,t){const col=t==='ok'?'text-ok-ink':t==='warn'?'text-warn-ink':t==='bad'?'text-bad-ink':'text-ink';
  return `<div class="flex items-center justify-between px-3 h-9 rounded-md bg-sunken"><span class="text-[12.5px] text-muted">${l}</span><span class="mono text-[13px] font-semibold ${col}">${v}</span></div>`;}
function ruleCard(rec,rl,i,total,res){
  const editing=DB.ui.editRule===rl.id;
  const count=(res.perRule.find(p=>p.rule.id===rl.id)||{}).count||0;
  return `<div class="card ${rl.enabled?'':'opacity-60'} ${editing?'ring-1 ring-accent':''}">
    <div class="flex items-center gap-3 px-3.5 py-3">
      <div class="flex flex-col text-faint">
        <button data-act="rule-up" data-id="${rec.id}" data-rule="${rl.id}" class="hover:text-ink ${i===0?'invisible':''}">${icon('up','w-3.5 h-3.5')}</button>
        <button data-act="rule-down" data-id="${rec.id}" data-rule="${rl.id}" class="hover:text-ink ${i===total-1?'invisible':''}">${icon('down','w-3.5 h-3.5')}</button></div>
      <div class="mono text-[12px] text-faint w-4">${rl.priority}</div>
      <div class="flex-1 min-w-0">
        <div class="font-semibold text-[13px] flex items-center gap-2">${esc(rl.name)}${count?`<span class="text-[11px] font-medium text-muted mono">· ${count} matched</span>`:''}</div>
        <div class="mt-1.5">${condChips(rl.cond)}</div></div>
      <div class="flex items-center gap-3">
        ${confBar(rl.confidence)}
        <button data-act="edit-rule" data-rule="${rl.id}" class="btn btn-ghost btn-sm">${editing?'Done':'Edit'}</button>
        <div class="switch" data-on="${rl.enabled}" data-act="toggle-rule" data-id="${rec.id}" data-rule="${rl.id}"></div></div>
    </div>
    ${editing?ruleEditor(rec,rl):''}</div>`;
}
function ruleEditor(rec,rl){
  const c=rl.cond;
  return `<div class="border-t border-line px-3.5 py-4 bg-canvas/60 grid grid-cols-4 gap-4 fade-in">
    <div><label class="lbl block mb-1.5">Rule name</label><input class="field" value="${esc(rl.name)}" data-rf="name" data-rule="${rl.id}"></div>
    <div><label class="lbl block mb-1.5">Reference</label><select class="field" data-rf="ref" data-rule="${rl.id}">

      <button data-act="del-rule" data-id="${rec.id}" data-rule="${rl.id}" class="btn btn-ghost btn-sm text-bad-ink">${icon('trash','w-3.5 h-3.5')}Delete rule</button></div></div>`;
}
// track whether current computed differs from last committed to show Apply state
function engineChanged(rec){ if(!rec.lastRun)return true; const r=engine(rec); return r.rate!==rec.lastRun.rate || r.matched.length!==rec.lastRun.matched; }

// ── Matches tab ──
function recRow(rec,r,compact){
  const kindCol=r.amount<0?'text-bad-ink':'text-ink';
  return `<div class="min-w-0"><div class="flex items-center gap-2"><span class="mono font-semibold ${kindCol} text-[13px]">${fmtMoney(r.amount,r.currency)}</span>
    <span class="text-[11px] text-faint mono">${fmtDate(r.date)}</span></div>
    <div class="text-[12px] text-ink-soft truncate">${esc(r.counterparty)} · <span class="text-muted">${esc(r.memo)}</span></div>
    ${r.reference?`<div class="text-[11px] text-faint mono truncate">${esc(r.reference)}</div>`:''}</div>`;
}
function reconMatches(rec,res){
  const f=DB.filters.m||'all';
  const rows=res.matches.filter(m=>f==='all'?true:f==='auto'?m.confidence>=rec.threshold:m.confidence<rec.threshold);
  const A=id=>rec.records.find(r=>r.id===id), B=id=>rec.records.find(r=>r.id===id);
  const tab=(k,l,n)=>`<button data-act="mfilter" data-f="${k}" class="btn btn-sm ${f===k?'btn-primary':'btn-ghost'}">${l}${n!=null?` <span class="mono opacity-80">${n}</span>`:''}</button>`;
  return `<div class="p-6">
    <div class="flex items-center gap-2 mb-4">${tab('all','All',res.matches.length)}${tab('auto','Auto-matched',res.matched.length)}${tab('sugg','Suggested',res.suggested.length)}
      <div class="ml-auto text-[12px] text-muted">${TYPE_META[rec.type].a} <span class="mono">A</span> &nbsp;↔&nbsp; <span class="mono">B</span> ${TYPE_META[rec.type].b}</div></div>
    <div class="space-y-2">
      ${rows.length?rows.map(m=>{const a=A(m.aId),b=B(m.bId);const sugg=m.confidence<rec.threshold;
        return `<div class="card px-4 py-3 grid items-center gap-3" style="grid-template-columns:1fr 150px 1fr auto">
          ${recRow(rec,a)}
          <div class="flex flex-col items-center gap-1">
            <div class="flex items-center gap-1.5 text-faint w-full"><span class="h-px flex-1 bg-line"></span>${icon('merge','w-3.5 h-3.5')}<span class="h-px flex-1 bg-line"></span></div>
            ${confBar(m.confidence)}
            <div class="text-[10.5px] text-faint truncate max-w-[140px]">${esc(m.ruleName)}</div></div>
          ${recRow(rec,b)}
          <div class="flex flex-col gap-1.5 items-end w-[120px]">${statusPill(sugg?'suggested':'matched')}
            ${sugg?`<div class="flex gap-1"><button data-act="accept-sugg" data-id="${rec.id}" data-a="${m.aId}" data-b="${m.bId}" class="btn btn-sm btn-ghost text-ok-ink px-2">${icon('check','w-3.5 h-3.5')}</button>
              <button data-act="reject-sugg" data-id="${rec.id}" data-a="${m.aId}" data-b="${m.bId}" class="btn btn-sm btn-ghost text-bad-ink px-2">${icon('x','w-3.5 h-3.5')}</button></div>`:''}</div>
        </div>`;}).join('')
      :emptyState('No matches in this view','Try running the reconciliation or adjusting rules.')}
    </div></div>`;
}

// ── Exceptions tab ──
function breakReason(rec,r){
  const map={fee:'Processor fee — book to expense',chargeback:'Chargeback — investigate & book',refund:'Refund not in ledger',
    'bank-fee':'Bank fee — book to expense',interest:'Interest earned — book to income',
    'in-transit':'In transit — clears next period',outstanding:'Outstanding — not yet cleared',
    unapplied:'Unapplied cash on account',timing:'Timing — posts next period',
    overdue:'Overdue >60 days — send to collections',dispute:'Disputed — route to disputes queue',
    unpaid:'Bill approved, awaiting payment',nobill:'Payment with no matching bill',
    tax:'Tax withholding — book liability',reimb:'Expense reimbursement — clear',
    shrinkage:'Shrinkage / damage — book variance',noreceipt:'Invoice with no goods receipt'};
  return map[r.kind] || (r.side==='A'?'Present in source, missing in ledger':'Present in ledger, missing in source');
}
function reconExceptions(rec,res){

function plCard(){
  const rows=[['Revenue',42000000000],['Cost of goods sold',-15100000000],['Gross profit',26900000000,true],['Operating expenses',-18600000000],['Net income',8300000000,true]];
  return `<div class="card overflow-hidden"><div class="flex items-center px-4 h-11 border-b border-line"><div class="font-semibold text-[13px]">Profit &amp; loss</div>
    <span class="ml-auto chip">Preview · read-only</span></div>
    <div class="p-4 text-[13px]">${rows.map(([l,v,b])=>`<div class="flex justify-between py-1.5 ${b?'border-t border-line font-semibold':''}"><span class="${b?'':'text-ink-soft'}">${l}</span><span class="mono ${v<0?'text-muted':''}">${fmtMoney(v)}</span></div>`).join('')}
    <div class="text-[11px] text-faint mt-3">Generated from reconciled ledgers · figures illustrative in this prototype.</div></div></div>`;
}

// ═══════════════════════════════════════ view: intercompany ═══════════════════════════════════════
const IC_TABS=[['matching','Matching engine'],['entities','Entities & mapping'],['pricing','Transfer pricing'],['consolidation','Consolidation']];
function viewIntercompany(){
  const tab=DB.route.tab||'matching';
  const ie=icEngine();
  let body;
  if(tab==='entities') body=icEntities();
  else if(tab==='pricing') body=icPricing();
  else if(tab==='consolidation') body=icConsolidation(ie);
  else body=icMatching(ie);
  const exc=ie.mismatch.length+ie.unmatched.length;
  return topbar('Intercompany &amp; multi-entity',`${DB.entities.length} legal entities · eliminations for ${esc(DB.period.label)}`,'')
   +`<div class="flex-none px-6 border-b border-line bg-surface flex items-center gap-1">
     ${IC_TABS.map(([k,l])=>`<button data-act="ic-tab" data-t="${k}" class="h-10 px-3 text-[13px] font-medium border-b-2 -mb-px transition ${tab===k?'border-accent text-accent-ink':'border-transparent text-muted hover:text-ink'}">${l}${k==='matching'&&exc?` <span class="mono text-[11px] text-warn-ink">${exc}</span>`:''}</button>`).join('')}
   </div><div class="flex-1 overflow-y-auto fade-in">${body}</div>`;
}
function icBadge(s){return s==='matched'?'<span class="text-ok-ink text-[12px] font-medium">Ready to eliminate</span>':s==='eliminated'?statusPill('resolved'):s==='mismatch'?'<span class="text-warn-ink text-[12px] font-medium">Amount mismatch</span>':'<span class="text-bad-ink text-[12px] font-medium">Unmatched</span>';}
function icMatching(ie){
  const ent=id=>getEntity(id);
  return `<div class="p-6">
    <div class="grid grid-cols-4 gap-3 mb-5">
      ${kpi('IC transactions',ie.t.length,'across all entities')}
      ${kpi('Ready to eliminate',ie.matched.length,fmtMoney(ie.readyValue)+' matched')}
      ${kpi('Exceptions',ie.mismatch.length+ie.unmatched.length,'mismatch or unbooked')}
      ${kpi('Eliminated',ie.eliminated.length,fmtMoney(ie.elimValue)+' removed')}
    </div>
    <div class="card overflow-hidden"><div class="px-4 h-11 flex items-center border-b border-line"><div class="font-semibold text-[13px]">Intercompany matching</div><div class="ml-auto text-[11.5px] text-muted">Seller AR ↔ buyer AP · flagged for elimination on match</div></div>
    <table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line">
      <th class="px-4 py-2 font-semibold">Reference</th><th class="px-3 py-2 font-semibold">Flow</th><th class="px-3 py-2 font-semibold">Description</th>
      <th class="px-3 py-2 font-semibold text-right">Seller AR</th><th class="px-3 py-2 font-semibold text-right">Buyer AP</th><th class="px-3 py-2 font-semibold text-right">Δ</th>
      <th class="px-3 py-2 font-semibold">Status</th><th class="px-4 py-2 font-semibold text-right">Action</th></tr></thead><tbody>
      ${ie.t.map(x=>{const s=ent(x.seller),b=ent(x.buyer);return `<tr class="border-b border-line-soft">
        <td class="px-4 py-2.5 mono">${x.ref}</td>
        <td class="px-3 py-2.5 whitespace-nowrap"><span class="chip">${s.code}</span> <span class="text-faint">→</span> <span class="chip">${b.code}</span></td>
        <td class="px-3 py-2.5 text-ink-soft">${esc(x.desc)}</td>
        <td class="px-3 py-2.5 text-right mono">${fmtMoney(x.arINR)}</td>
        <td class="px-3 py-2.5 text-right mono ${x.apINR==null?'text-bad-ink':''}">${x.apINR==null?'— missing':fmtMoney(x.apINR)}</td>
        <td class="px-3 py-2.5 text-right mono ${x.delta?'text-warn-ink':'text-faint'}">${x.delta==null?'—':fmtMoney(x.delta)}</td>
        <td class="px-3 py-2.5">${icBadge(x.status)}</td>
        <td class="px-4 py-2.5 text-right">${x.status==='matched'?`<button data-act="ic-eliminate" data-id="${x.id}" class="btn btn-sm btn-primary">Eliminate</button>`:x.status==='eliminated'?`<button data-act="ic-eliminate" data-id="${x.id}" class="btn btn-sm btn-ghost">Undo</button>`:'<span class="text-[12px] text-faint">Review</span>'}</td></tr>`;}).join('')}
    </tbody></table></div></div>`;
}
function icEntities(){
  const canon=[['Cash & equivalents','1000'],['Accounts receivable','1100'],['Intercompany receivable','1150'],['Revenue','4000'],['Intercompany revenue','4050']];
  return `<div class="p-6">
    <div class="card overflow-hidden mb-5"><div class="px-4 h-11 flex items-center border-b border-line"><div class="font-semibold text-[13px]">Legal entities</div><div class="ml-auto text-[11.5px] text-muted">Common reporting currency · INR</div></div>
    <table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line"><th class="px-4 py-2 font-semibold">Entity</th><th class="px-3 py-2 font-semibold">Code</th><th class="px-3 py-2 font-semibold">Functional currency</th><th class="px-3 py-2 font-semibold">Accounting standard</th><th class="px-4 py-2 font-semibold text-right">FX → INR</th></tr></thead><tbody>
     ${DB.entities.map(e=>`<tr class="border-b border-line-soft"><td class="px-4 py-2.5 font-medium">${esc(e.name)}</td><td class="px-3 py-2.5"><span class="chip">${e.code}</span></td><td class="px-3 py-2.5 mono">${e.currency}</td><td class="px-3 py-2.5 text-muted">${e.coa}</td><td class="px-4 py-2.5 text-right mono">${e.fx.toFixed(2)}</td></tr>`).join('')}
    </tbody></table></div>
    <div class="card overflow-hidden"><div class="px-4 h-11 flex items-center border-b border-line"><div class="font-semibold text-[13px]">Chart-of-accounts mapping</div><div class="ml-auto text-[11.5px] text-muted">Local COA → common reporting standard</div></div>
    <table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line"><th class="px-4 py-2 font-semibold">Common account</th><th class="px-3 py-2 font-semibold">Group</th><th class="px-3 py-2 font-semibold">IN · Ind AS</th><th class="px-3 py-2 font-semibold">US · GAAP</th><th class="px-3 py-2 font-semibold">UK · IFRS</th></tr></thead><tbody>
     ${canon.map(([l,code])=>`<tr class="border-b border-line-soft"><td class="px-4 py-2.5 font-medium">${l}</td><td class="px-3 py-2.5 mono text-muted">${code}</td><td class="px-3 py-2.5 mono text-faint">${code}·IN</td><td class="px-3 py-2.5 mono text-faint">${code}·US</td><td class="px-3 py-2.5 mono text-faint">${code}·UK</td></tr>`).join('')}
    </tbody></table></div></div>`;
}
function icPricing(){
  const ent=id=>getEntity(id);
  const sb=s=>s==='compliant'?'<span class="text-ok-ink text-[12px] font-medium">Within policy</span>':s==='below-policy'?'<span class="text-bad-ink text-[12px] font-medium">Below policy</span>':'<span class="text-warn-ink text-[12px] font-medium">Needs review</span>';
  return `<div class="p-6"><div class="card overflow-hidden"><div class="px-4 h-11 flex items-center border-b border-line"><div class="font-semibold text-[13px]">Transfer pricing validation</div><div class="ml-auto text-[11.5px] text-muted">Actual vs. agreed intercompany margins</div></div>
    <table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line"><th class="px-4 py-2 font-semibold">Flow</th><th class="px-3 py-2 font-semibold">Category</th><th class="px-3 py-2 font-semibold">Method</th><th class="px-3 py-2 font-semibold text-right">Agreed</th><th class="px-3 py-2 font-semibold text-right">Actual</th><th class="px-3 py-2 font-semibold text-right">Variance</th><th class="px-4 py-2 font-semibold">Status</th></tr></thead><tbody>
     ${DB.transferPricing.map(t=>{const f=ent(t.from),to=ent(t.to);const v=(t.actual-t.agreed).toFixed(1);return `<tr class="border-b border-line-soft">
       <td class="px-4 py-2.5 whitespace-nowrap"><span class="chip">${f.code}</span> <span class="text-faint">→</span> <span class="chip">${to.code}</span></td>
       <td class="px-3 py-2.5 text-ink-soft">${esc(t.category)}</td><td class="px-3 py-2.5 text-muted">${t.method}</td>
       <td class="px-3 py-2.5 text-right mono">${t.agreed.toFixed(1)}%</td><td class="px-3 py-2.5 text-right mono">${t.actual.toFixed(1)}%</td>
       <td class="px-3 py-2.5 text-right mono ${Math.abs(t.actual-t.agreed)>2?'text-warn-ink':'text-faint'}">${v>0?'+':''}${v}pp</td>
       <td class="px-4 py-2.5">${sb(t.status)}</td></tr>`;}).join('')}
    </tbody></table></div></div>`;
}
function icConsolidation(ie){
  const rev=DB.entityRevenue;
  const totalStandalone=DB.entities.reduce((s,e)=>s+(rev[e.id]||0),0);
  const elim=ie.elimValue, flagged=ie.readyValue, consolidated=totalStandalone-elim;
  return `<div class="p-6">
    <div class="grid grid-cols-3 gap-3 mb-5">
      ${kpi('Standalone revenue',fmtMoney(totalStandalone),`${DB.entities.length} entities combined`)}
      ${kpi('Eliminations applied',fmtMoney(elim),ie.eliminated.length+' intercompany entries')}
      ${kpi('Consolidated revenue',fmtMoney(consolidated),flagged?fmtMoney(flagged)+' more pending':'all eliminations applied')}
    </div>
    <div class="card overflow-hidden"><div class="px-4 h-11 flex items-center border-b border-line"><div class="font-semibold text-[13px]">Consolidation ledger</div><div class="ml-auto text-[11.5px] text-muted">Standalone → eliminations → consolidated (INR)</div></div>
    <table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line"><th class="px-4 py-2 font-semibold">Entity</th><th class="px-3 py-2 font-semibold">Currency</th><th class="px-4 py-2 font-semibold text-right">Standalone revenue</th></tr></thead><tbody>
     ${DB.entities.map(e=>`<tr class="border-b border-line-soft"><td class="px-4 py-2.5 font-medium">${esc(e.name)}</td><td class="px-3 py-2.5 mono text-muted">${e.currency}</td><td class="px-4 py-2.5 text-right mono">${fmtMoney(rev[e.id]||0)}</td></tr>`).join('')}
     <tr class="border-b border-line-soft"><td class="px-4 py-2.5 font-medium text-bad-ink">Intercompany eliminations</td><td></td><td class="px-4 py-2.5 text-right mono text-bad-ink">(${fmtMoney(elim)})</td></tr>
    </tbody><tfoot><tr class="border-t border-line"><td class="px-4 py-2.5 font-bold" colspan="2">Consolidated revenue</td><td class="px-4 py-2.5 text-right mono font-bold text-[14px]">${fmtMoney(consolidated)}</td></tr></tfoot></table>
    ${flagged?`<div class="px-4 py-3 border-t border-line text-[12px] text-muted flex items-center gap-2">${icon('alert','w-4 h-4 text-warn')}${fmtMoney(flagged)} of matched intercompany revenue is ready to eliminate but not yet applied — apply it in the Matching engine.</div>`:''}</div></div>`;
}

// ═══════════════════════════════════════ render ═══════════════════════════════════════
function render(){
  const r=DB.route; let v;
  if(r.name==='recon') v=viewRecon();
  else if(r.name==='ingestion') v=viewIngestion();
  else if(r.name==='intercompany') v=viewIntercompany();
  else if(r.name==='exceptions') v=viewExceptions();
  else if(r.name==='close') v=viewClose();
  else if(r.name==='settings') v=viewSettings();
  else v=viewDashboard();
  $('#app').innerHTML=shell(v);
  save();
}

// ═══════════════════════════════════════ actions ═══════════════════════════════════════
function logAudit(action,detail){(DB.audit=DB.audit||[]).unshift({at:todayISO()+'T'+new Date().toTimeString().slice(0,5),user:DB.user.name,action,detail});if(DB.audit.length>60)DB.audit.pop();}
const ACT={
  goto:d=>{DB.route={name:d.r};DB.ui.editRule=null;render();},
  'open-recon':d=>{DB.route={name:'recon',recId:d.id,tab:'overview'};DB.ui.editRule=null;render();},
  'open-recon-tab':d=>{DB.route={name:'recon',recId:d.id,tab:d.t};render();},
  'recon-tab':d=>{DB.route.tab=d.t;DB.ui.editRule=null;render();},
  'new-recon':()=>{DB.ui.newType='payments';modalNew();},
  'new-type':d=>{DB.ui.newType=d.t;modalNew();},
  'create-recon':()=>{const t=DB.ui.newType||'payments';const name=($('#new-name').value.trim())||`${TYPE_META[t].a} ↔ ${TYPE_META[t].b}`;
    const rec=buildRec(t,name,DB.user.name);const res=engine(rec);rec.lastRun={at:todayISO()+'T'+new Date().toTimeString().slice(0,5),rate:res.rate,matched:res.matched.length,breaks:res.breaks.length,history:seedTrend(res.rate)};
    DB.recs.push(rec);closeModal();DB.route={name:'recon',recId:rec.id,tab:'rules'};render();toast('Reconciliation created');},
  'close-modal':(d,el,e)=>{if(el.dataset.backdrop&&e.target!==el)return;closeModal();},
  'run-recon':d=>{const rec=getRec(d.id);const res=engine(rec);const prev=rec.lastRun?rec.lastRun.history:seedTrend(res.rate);
    rec.lastRun={at:todayISO()+'T'+new Date().toTimeString().slice(0,5),rate:res.rate,matched:res.matched.length,breaks:res.breaks.length,history:[...prev.slice(-11),res.rate]};
    logAudit('Ran reconciliation',`${rec.name} · ${res.rate.toFixed(1)}% matched, ${res.breaks.length} breaks`);
    render();toast(`Run complete · ${res.rate.toFixed(1)}% matched`);},
  'close-period':()=>{DB.period.status='closed';logAudit('Closed period',DB.period.label);render();toast(`${DB.period.label} closed`);},
  'toast-soon':()=>toast('Connection flow is mocked in this prototype','warn'),
  'ic-tab':d=>{DB.route.tab=d.t;render();},
  'ic-eliminate':d=>{const x=DB.icTxns.find(t=>t.id===d.id);x.eliminated=!x.eliminated;logAudit(x.eliminated?'Eliminated intercompany':'Reversed elimination',`${x.ref} · ${fmtMoney(x.arINR)}`);render();toast(x.eliminated?'Flagged & eliminated':'Elimination reversed');},
  'edit-rule':d=>{DB.ui.editRule=DB.ui.editRule===d.rule?null:d.rule;render();},
  'toggle-rule':d=>{const rec=getRec(d.id);const rl=rec.rules.find(x=>x.id===d.rule);rl.enabled=!rl.enabled;render();},
  'add-rule':d=>{const rec=getRec(d.id);const maxP=Math.max(0,...rec.rules.map(r=>r.priority));
    const rl=ruleC('New rule',true,maxP+1,'exact',{mode:'exact',value:0},{days:2},85);rec.rules.push(rl);DB.ui.editRule=rl.id;render();},
  'del-rule':d=>{const rec=getRec(d.id);rec.rules=rec.rules.filter(r=>r.id!==d.rule);reprioritize(rec);DB.ui.editRule=null;render();toast('Rule deleted','warn');},
  'rule-up':d=>moveRule(d.id,d.rule,-1),'rule-down':d=>moveRule(d.id,d.rule,1),
  'revert-rules':d=>{const rec=getRec(d.id);DB=JSON.parse(localStorage.getItem(STORE_KEY));render();},
  'mfilter':d=>{DB.filters.m=d.f;render();},
  'accept-sugg':d=>{const rec=getRec(d.id);rec.confirmed.push({aId:d.a,bId:d.b});const a=rec.records.find(x=>x.id===d.a);logAudit('Confirmed match',`${rec.name} · ${a?esc(a.counterparty):''} ${a?fmtMoney(a.amount):''}`);render();toast('Match confirmed');},
  'reject-sugg':d=>{const rec=getRec(d.id);(rec.rejected=rec.rejected||[]).push({aId:d.a,bId:d.b});render();toast('Suggestion dismissed','warn');},
  'resolve-break':d=>{const rec=getRec(d.id);const r=rec.records.find(x=>x.id===d.recItem);r.resolution=d.mode;
    const lbl=d.mode==='writeoff'?'Wrote off break':d.mode==='journal'?'Manual journal entry':'Marked for investigation';
    logAudit(lbl,`${rec.name} · ${esc(r.counterparty)} ${fmtMoney(r.amount)} — ${breakReason(rec,r)}`);
    render();toast(d.mode==='writeoff'?'Written off':d.mode==='journal'?'Journal entry created':'Marked for investigation');},
  'unresolve':d=>{const rec=getRec(d.id);const r=rec.records.find(x=>x.id===d.recItem);r.resolution=null;render();},
  reset:()=>{resetAll();toast('Sample data restored');},
};
function reprioritize(rec){rec.rules.slice().sort((a,b)=>a.priority-b.priority).forEach((r,i)=>r.priority=i+1);}
function moveRule(recId,ruleId,dir){const rec=getRec(recId);const sorted=rec.rules.slice().sort((a,b)=>a.priority-b.priority);
  const i=sorted.findIndex(r=>r.id===ruleId);const j=i+dir;if(j<0||j>=sorted.length)return;
  const p=sorted[i].priority;sorted[i].priority=sorted[j].priority;sorted[j].priority=p;render();}

// ═══════════════════════════════════════ listeners ═══════════════════════════════════════
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-act]');if(!el)return;
  const act=el.dataset.act;if(!ACT[act])return;
  if(act!=='close-modal')e.preventDefault();
  ACT[act](el.dataset,el,e);
});
document.addEventListener('input',e=>{
  const t=e.target;
  if(t.dataset.thresh){const rec=getRec(t.dataset.thresh);rec.threshold=+t.value;render();return;}
  if(t.dataset.rf){applyRuleField(t);return;}
});
document.addEventListener('change',e=>{
  const t=e.target;
  if(t.dataset.rf&&(t.dataset.rf==='ref'||t.dataset.rf==='amode')){applyRuleField(t);}
});
function applyRuleField(t){
  const rec=getRec(DB.route.recId);if(!rec)return;const rl=rec.rules.find(r=>r.id===t.dataset.rule);if(!rl)return;
  const f=t.dataset.rf,v=t.value;
  if(f==='name')rl.name=v;
  else if(f==='ref')rl.cond.ref=v;
  else if(f==='amode'){rl.cond.amount.mode=v;if(v==='exact')rl.cond.amount.value=0;}
  else if(f==='aval'){rl.cond.amount.value=rl.cond.amount.mode==='abs'?Math.round((+v||0)*100):(+v||0);}
  else if(f==='date')rl.cond.date.days=clamp(+v||0,0,60);
  else if(f==='conf')rl.confidence=clamp(+v||50,50,100);
  // live update: re-render but keep editor open & focus
  const active=document.activeElement;const key=active&&active.dataset?active.dataset.rf:null;const rid=active&&active.dataset?active.dataset.rule:null;const pos=active?active.selectionStart:null;
  render();
  if(key){const ne=document.querySelector(`[data-rf="${key}"][data-rule="${rid}"]`);if(ne){ne.focus();try{if(pos!=null&&ne.setSelectionRange)ne.setSelectionRange(pos,pos);}catch(_){}}}
}

render();
</script>
