    // ═══════════════════════════════════════ view: reports (historical archive) ═══════════════════════════════════════
    // Everything below is derived live from DB.recs / DB.audit — the app only keeps one lastRun
    // snapshot per reconciliation definition (no multi-run history table), so "archive" here means
    // the current run state of every configured reconciliation, not a growing log of past runs.
    function defaultRepFilters() { return { runQ: '', runStatus: 'all', runType: 'all', matQ: '', matType: 'all', matRun: 'all', excQ: '', excType: 'all', excStatus: 'all', audQ: '', audCat: 'all' }; }
    function reportsInit() { DB.ui.rep = DB.ui.rep || defaultRepFilters(); }
    function runIdFor(rc) { return `RUN-${rc.lastRun.at.slice(0, 10).replace(/-/g, '')}-${(rc.id || '').replace(/[^a-zA-Z0-9]/g, '').slice(-5).toUpperCase()}`; }
    function liveReportRuns() {
      return DB.recs.filter(rc => rc.lastRun).map(rc => {
        const res = getEngineResult(rc);
        const isAR = rc.type === 'ar-reconciliation';
        const volume = isAR ? res.invoices.length + res.payments.length : res.total;
        const matchedN = isAR ? res.matches.length + res.overpays.length : res.matched.length;
        const openExceptions = isAR ? res.exceptions.filter(e => e.status === 'Open').length : res.breaks.length;
        const exceptionValue = isAR ? res.exceptions.filter(e => e.status === 'Open').reduce((s, e) => s + e.amount, 0) : res.breakVal;
        const unappliedCash = isAR ? res.unapplied.reduce((s, u) => s + u.amount, 0) : 0;
        const matchedValue = isAR ? (res.matches.reduce((s, m) => s + m.amount, 0) + res.overpays.reduce((s, m) => s + m.amount, 0)) : res.matchedVal;
        const status = isAR ? (rc.arFinished ? 'Signed off' : (openExceptions === 0 ? 'Completed' : 'Under review'))
          : (res.breaks.length === 0 ? 'Completed' : 'Under review');
        return {
          runId: runIdFor(rc), recId: rc.id, date: rc.lastRun.at.slice(0, 10), type: TYPE_META[rc.type].label, volume,
          matched: matchedN, matchRate: res.rate, unappliedCash, exceptions: openExceptions, status,
          preparedBy: rc.owner, reviewedBy: isAR && rc.arFinished ? rc.arFinished.by : null,
          signedAt: isAR && rc.arFinished ? rc.arFinished.at : null, matchedValue, exceptionValue, currency: 'INR',
        };
      }).sort((a, b) => a.date < b.date ? 1 : -1);
    }
    function liveReportMatched() {
      const out = [];
      DB.recs.filter(rc => rc.lastRun).forEach(rc => {
        const res = getEngineResult(rc), runId = runIdFor(rc), isAR = rc.type === 'ar-reconciliation';
        if (isAR) {
          const manualGroupFor = invId => (rc.arManualMatches || []).find(g => g.invoiceIds.includes(invId));
          const matchTypeFor = invId => { const g = manualGroupFor(invId); if (!g) return 'Exact'; if (g.invoiceIds.length > 1 && g.paymentIds.length > 1) return 'Many-to-Many'; if (g.invoiceIds.length > 1) return 'One-to-Many'; if (g.paymentIds.length > 1) return 'Many-to-One'; return 'Manual'; };
          [...res.matches, ...res.overpays].forEach(m => out.push({
            id: uid('mt'), stream: 'bank-cash', runId, recId: rc.id, date: rc.lastRun.at.slice(0, 10),
            invoiceId: m.invoiceId, invoiceNum: m.invoiceNum, sideA: `Invoice ${m.invoiceNum}`,
            paymentId: m.paymentId, sideB: `Payment ${m.paymentId}`, customer: m.customer,
            reference: m.invoiceNum, amount: m.amount, overage: m.overage || 0,
            matchType: matchTypeFor(m.invoiceId), at: rc.lastRun.at, user: rc.owner, status: 'matched'
          }));
          (rc.arData.gatewaySettlements || []).forEach(g => out.push({
            id: uid('mt'), stream: 'gateway', runId, recId: rc.id, date: rc.lastRun.at.slice(0, 10),
            settlementId: g.settlementId, gateway: g.gateway, transactionId: g.transactionId,
            grossAmount: g.grossAmount, feeAmount: g.feeAmount, netAmount: g.netAmount,
            amount: g.netAmount, customer: g.customer || '—', reference: g.transactionId,
            matchType: 'Gateway', at: rc.lastRun.at, user: rc.owner, status: g.matched ? 'matched' : 'break'
          }));
          if (res.glControlBalances) {
            const g = res.glControlBalances;
            out.push({
              id: uid('mt'), stream: 'gl', runId, recId: rc.id, date: rc.lastRun.at.slice(0, 10),
              account: g.account, subledgerBalance: g.subledgerBalance, glBalance: g.glBalance,
              variance: g.variance, amount: g.variance, customer: 'GL Control',
              reference: g.account, matchType: 'GL Control', at: rc.lastRun.at, user: rc.owner,
              status: g.variance === 0 ? 'matched' : 'break'
            });
          }
        } else {
          res.matched.forEach(m => {
            const a = res.A.find(x => x.id === m.aId), b = res.B.find(x => x.id === m.bId);
            if (!a || !b) return;
            out.push({
              id: uid('mt'), stream: 'bank-cash', runId, recId: rc.id, date: rc.lastRun.at.slice(0, 10),
              invoiceId: a.id, invoiceNum: a.reference || a.id, sideA: `${a.memo || a.kind || ''} ${a.reference || ''}`.trim(),
              paymentId: b.reference || b.id, sideB: `${b.memo || b.kind || ''} ${b.reference || ''}`.trim(),
              customer: a.counterparty || b.counterparty || '—', reference: a.reference || b.reference || '—',
              amount: Math.abs(a.amount), overage: 0, matchType: m.ruleId === 'manual' ? 'Manual' : (m.ruleName || 'Rule match'),
              at: rc.lastRun.at, user: rc.owner, status: 'matched'
            });
          });
        }
      });
      return out.sort((a, b) => a.at < b.at ? 1 : -1);
    }
    function liveReportExceptions() {
      const out = [];
      DB.recs.filter(rc => rc.lastRun).forEach(rc => {
        const res = getEngineResult(rc), runId = runIdFor(rc), isAR = rc.type === 'ar-reconciliation';
        if (isAR) {
          res.exceptions.forEach(e => {
            const r = (rc.arResolved || {})[e.key];
            out.push({ id: e.id + '-' + rc.id, runId, date: e.date, type: e.type, customer: e.customer || '—', reference: e.relatedId, amount: e.amount, reasonCode: (r && r.note) || '—', status: e.status, resolver: r ? rc.owner : null });
          });
        } else {
          res.breaks.forEach(r => out.push({ id: r.id, runId, date: r.date, type: 'Unmatched', customer: r.counterparty || '—', reference: r.reference || '—', amount: Math.abs(r.amount), reasonCode: '—', status: 'Open', resolver: null }));
        }
      });
      return out.sort((a, b) => a.date < b.date ? 1 : -1);
    }
    function auditCategoryFor(action) {

    const runStatusPill = s => s === 'Under review' ? '<span class="chip bg-warn-soft text-warn-ink border-warn-soft">Under review</span>' : s === 'Completed' ? '<span class="chip bg-sunken text-ink-soft">Completed</span>' : '<span class="chip bg-ok-soft text-ok-ink border-ok-soft">Signed off</span>';
    const excStatusPill = s => s === 'Open' ? '<span class="chip bg-warn-soft text-warn-ink border-warn-soft">Open</span>' : s === 'Written off' ? '<span class="chip bg-sunken text-muted">Written off</span>' : `<span class="chip bg-ok-soft text-ok-ink border-ok-soft">${s}</span>`;
    const excTag = t => { const m = { 'Short-Pay': 'bg-warn-soft text-warn-ink', 'Unapplied Payment': 'bg-warn-soft text-warn-ink', 'Timing Difference': 'bg-sunken text-ink-soft', 'Overpayment': 'bg-accent-soft text-accent-ink', 'Write-off': 'bg-sunken text-muted', 'GL Control Mismatch': 'bg-bad-soft text-bad-ink', 'Gateway Variance': 'bg-bad-soft text-bad-ink', 'Unmatched': 'bg-sunken text-ink-soft' }; return `<span class="inline-flex items-center h-[20px] px-2 rounded text-[11px] font-semibold ${m[t] || 'bg-sunken text-muted'}">${esc(t)}</span>`; };
    function repRunsFiltered() { const f = DB.ui.rep, q = (f.runQ || '').toLowerCase(); return liveReportRuns().filter(r => { if (f.runStatus !== 'all' && r.status !== f.runStatus) return false; if (f.runType !== 'all' && r.type !== f.runType) return false; if (q && ![r.runId, r.type, r.preparedBy, r.status].join(' ').toLowerCase().includes(q)) return false; return true; }); }
    function repMatchedFiltered() {
      const f = DB.ui.rep || {};
      const stream = (DB.ui && DB.ui.repMatchStream) || 'all';
      const q = (f.matQ || '').toLowerCase();
      return liveReportMatched().filter(m => {
        if (stream !== 'all' && m.stream !== stream) return false;
        if (f.matType && f.matType !== 'all' && m.matchType !== f.matType) return false;
        if (f.matRun && f.matRun !== 'all' && m.runId !== f.matRun) return false;
        if (q) {
          const fields = [m.customer, m.reference, m.invoiceNum, m.paymentId, m.settlementId, m.account, m.runId, (m.amount / 100).toFixed(2)];
          if (!fields.some(v => (v || '').toString().toLowerCase().includes(q))) return false;
        }
        return true;
      });
    }
    function repExcFiltered() { const f = DB.ui.rep, q = (f.excQ || '').toLowerCase(); return liveReportExceptions().filter(x => { if (f.excType !== 'all' && x.type !== f.excType) return false; if (f.excStatus !== 'all' && x.status !== f.excStatus) return false; if (q && ![x.customer, x.reference, x.reasonCode, x.type, x.runId].join(' ').toLowerCase().includes(q)) return false; return true; }); }
    function repAuditRows() { const f = DB.ui.rep, q = (f.audQ || '').toLowerCase(); let rows = (DB.audit || []).map(a => ({ at: a.at, user: a.user, event: a.action, category: auditCategoryFor(a.action), runId: '—', detail: a.detail })).sort((a, b) => a.at < b.at ? 1 : -1); if (f.audCat !== 'all') rows = rows.filter(r => r.category === f.audCat); if (q) rows = rows.filter(r => [r.user, r.event, r.detail, r.runId].join(' ').toLowerCase().includes(q)); return rows; }
    // ── exports ──
    function downloadBlob(name, mime, content) { const b = new Blob([content], { type: mime }); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = name; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u); }
    function csvRow(a) { return a.map(v => { v = v == null ? '' : String(v); return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v; }).join(','); }
    function toCSV(headers, rows) { return [csvRow(headers), ...rows.map(csvRow)].join('\n'); }
    function exportReport(kind, fmt) {
      let headers, rows, name;
      if (kind === 'runs') { headers = ['Run ID', 'Date', 'Type', 'Volume', 'Matched', 'Match rate %', 'Unapplied cash', 'Exceptions', 'Status', 'Prepared by', 'Reviewed by']; rows = repRunsFiltered().map(r => [r.runId, r.date, r.type, r.volume, r.matched, r.matchRate, (r.unappliedCash / 100).toFixed(2), r.exceptions, r.status, r.preparedBy, r.reviewedBy || '']); name = 'reconciliation-runs'; }
      else if (kind === 'matched') { headers = ['Run ID', 'Date', 'Invoice / Side A', 'Payment / Side B', 'Customer', 'Reference', 'Amount', 'Match type', 'Timestamp', 'User']; rows = repMatchedFiltered().map(m => [m.runId, m.date, m.invoiceNum || m.sideA, m.paymentId || m.sideB, m.customer, m.reference, (m.amount / 100).toFixed(2), m.matchType, m.at, m.user]); name = 'matched-transactions'; }
      else { headers = ['Run ID', 'Date', 'Type', 'Customer', 'Reference', 'Amount', 'Reason code', 'Status', 'Resolver']; rows = repExcFiltered().map(x => [x.runId, x.date, x.type, x.customer, x.reference, (x.amount / 100).toFixed(2), x.reasonCode, x.status, x.resolver || '']); name = 'exceptions-log'; }

        logAudit('Opened investigation', `${rec.name} · ${r.counterparty} · assigned to ${r.investigation.owner} · due ${r.investigation.due}`); closeModal(); render(); toast('Investigation assigned — exception remains open', 'warn');
      },
      'save-resolution': d => {
        const rec = getRec(d.id), r = rec.records.find(x => x.id === d.recItem); const entry = { account: $('#resolution-account').value.trim(), reason: $('#resolution-reason').value, note: $('#resolution-note').value.trim(), requestedAt: todayISO(), requestedBy: DB.user.name, status: 'Pending review' }; r.resolution = d.mode; r.resolutionDetail = entry; r.investigation = null;
        const label = d.mode === 'journal' ? 'Proposed journal entry' : 'Requested write-off'; logAudit(label, `${rec.name} · ${r.counterparty} ${fmtMoney(r.amount)} · ${entry.account} · pending review`); closeModal(); render(); toast(d.mode === 'journal' ? 'Journal proposal sent for review' : 'Write-off requested for approval');
      },
      'unresolve': d => { const rec = getRec(d.id); const r = rec.records.find(x => x.id === d.recItem); r.resolution = null; r.resolutionDetail = null; logAudit('Reopened exception', `${rec.name} · ${r.counterparty}`); render(); },
      'del-doc': d => { DB.docs = (DB.docs || []).filter(x => x.id !== d.id); save(); render(); toast('Document removed', 'warn'); },
      'import-channel': d => { importState().type = d.t; render(); },
      'import-tab': d => { importState().tab = d.t; render(); },
      'import-reset': () => { const c = importState(); c.a = null; c.b = null; c.tab = 'a'; save(); render(); toast('Import cleared', 'warn'); },
      'import-run': () => { logAudit('Reconciled imported files', CHANNELS[importState().type].label); toast('Reconciliation created from imported files', 'ok'); },
      'dih-tab': d => { DB.route.tab = d.t; render(); },
      'view-job-data': d => { modalViewJobData(d.id); },
      'stg-page': d => { DB.filters.stgPage = +d.page; render(); },

      'stg-sort': d => { const s = DB.filters.stgSort || { field: 'date', dir: 'desc' }; DB.filters.stgSort = (s.field === d.field) ? { field: d.field, dir: s.dir === 'asc' ? 'desc' : 'asc' } : { field: d.field, dir: 'asc' }; DB.filters.stgPage = 1; render(); },
      'stg-insert': () => modalInsertRow(),
      'stg-add': () => { const r = { id: uid('stg'), date: $('#ins-date').value || todayISO(), description: ($('#ins-desc').value || '(untitled)'), reference: ($('#ins-ref').value || ''), amount: +($('#ins-amt').value || 0), currency: $('#ins-cur').value || 'INR', status: 'staged', jobId: 'manual', sourceLabel: 'Manually added' }; DB.staging = DB.staging || []; DB.staging.unshift(r); logAudit('Inserted staging row', `${r.description} ${fmtMoney(r.amount * 100, r.currency)}`); save(); closeModal(); render(); toast('Row inserted to staging'); },
      'stg-del': d => { DB.staging = (DB.staging || []).filter(x => x.id !== d.id); save(); render(); toast('Row removed', 'warn'); },
      'map-add': () => { DB.mappings = DB.mappings || []; DB.mappings.push({ id: uid('mp'), src: 'New field', ledger: LEDGER_FIELDS[0], transform: 'none', param: '' }); render(); },
      'map-del': d => { DB.mappings = (DB.mappings || []).filter(x => x.id !== d.id); render(); },
      'map-ai': () => {
        DB.ui = DB.ui || {};
        DB.ui.aiMappingLoading = true;
        render();
        setTimeout(() => {
          const selSource = (DB.ui && DB.ui.jobSource) || 'GL';
          DB.mappings = (DB.mappings || []).map(m => ({
            ...m,
            ledger: smartTarget(m.src, selSource)
          }));
          DB.ui.aiMappingLoading = false;
          DB.ui.aiMappingDone = true;
          save();
          render();
          toast('AI mapped source fields to target DB columns', 'ok');
        }, 850);
      },
      'confirm-mapping': () => {
        DB.ui = DB.ui || {};
        DB.ui.mappingConfirmed = true;
        DB.ui.uploadMappingModal = false;
        logAudit('Confirmed schema mapping', `${(DB.mappings || []).length} field(s) mapped`);
        save();
        closeModal();
        render();
        toast('Mapping Saved', 'ok');
        const info = DB.lastJobInfo || { fileName: DB.ui.uploadMappingFile || 'Uploaded file', selSource: DB.ui.uploadMappingSource || 'GL', jobId: 'job_102', rowCount: 3 };
        modalBatchJobStarted(info.fileName, info.selSource, info.jobId, info.rowCount);
      },





      'job-errors': d => { const j = (DB.jobs || []).find(x => x.id === d.id); toast(`${j.errors} row(s) failed validation in ${j.source}`, 'warn'); },
      reset: () => { resetAll(); toast('Sample data restored'); },
    };
    function reprioritize(rec) { rec.rules.slice().sort((a, b) => a.priority - b.priority).forEach((r, i) => r.priority = i + 1); }
    function moveRule(recId, ruleId, dir) {
      const rec = getRec(recId); const sorted = rec.rules.slice().sort((a, b) => a.priority - b.priority);
      const i = sorted.findIndex(r => r.id === ruleId); const j = i + dir; if (j < 0 || j >= sorted.length) return;
      const p = sorted[i].priority; sorted[i].priority = sorted[j].priority; sorted[j].priority = p; render();
    }
    function reprioritizeARPhase(rec, phase) { (rec.arRules || []).filter(r => r.phase === phase).sort((a, b) => a.priority - b.priority).forEach((r, i) => r.priority = i + 1); }
    function moveARRule(recId, ruleId, dir) {
      const rec = getRec(recId); const rl = (rec.arRules || []).find(r => r.id === ruleId); if (!rl) return;
      const sorted = rec.arRules.filter(r => r.phase === rl.phase).sort((a, b) => a.priority - b.priority);
      const i = sorted.findIndex(r => r.id === ruleId); const j = i + dir; if (j < 0 || j >= sorted.length) return;
      const p = sorted[i].priority; sorted[i].priority = sorted[j].priority; sorted[j].priority = p; render();
    }

    // ═══════════════════════════════════════ listeners ═══════════════════════════════════════
    document.addEventListener('click', e => {
      const el = e.target.closest('[data-act]'); if (!el) return;
      const act = el.dataset.act; if (!ACT[act]) return;
      if (act !== 'close-modal') e.preventDefault();
      ACT[act](el.dataset, el, e);
    });
    let stgSearchTimer, arExcSearchTimer, repSearchTimer;
    document.addEventListener('input', e => {
      const t = e.target;
      if (t.hasAttribute && t.hasAttribute('data-rep-q')) { DB.ui.rep = DB.ui.rep || defaultRepFilters(); DB.ui.rep[t.dataset.repQ + 'Q'] = t.value; clearTimeout(repSearchTimer); repSearchTimer = setTimeout(render, 250); return; }
      if (t.dataset.map && (t.dataset.map === 'src' || t.dataset.map === 'param')) { const m = (DB.mappings || []).find(x => x.id === t.dataset.id); if (m) m[t.dataset.map] = t.value; return; }
      if (t.dataset.stgSearch !== undefined && t.hasAttribute && t.hasAttribute('data-stg-search')) { DB.filters.stgQ = t.value; clearTimeout(stgSearchTimer); stgSearchTimer = setTimeout(render, 300); return; }
      if (t.hasAttribute && t.hasAttribute('data-ar-exc-search')) { DB.ui = DB.ui || {}; DB.ui.arExcFilter = DB.ui.arExcFilter || { q: '', type: 'all', sort: 'amount-desc' }; DB.ui.arExcFilter.q = t.value; clearTimeout(arExcSearchTimer); arExcSearchTimer = setTimeout(render, 250); return; }
      if (t.dataset.txnSearch) { DB.filters.txnQ = t.value; clearTimeout(txnSearchTimer); txnSearchTimer = setTimeout(render, 250); return; }
      if (t.dataset.thresh) { const rec = getRec(t.dataset.thresh); rec.threshold = +t.value; render(); return; }
      if (t.dataset.rf) { applyRuleField(t); return; }
      if (t.dataset.arf) { applyARRuleField(t); return; }
    });
    document.addEventListener('change', e => {
      const t = e.target;
      if (t.hasAttribute && t.hasAttribute('data-rep-sel')) { DB.ui.rep = DB.ui.rep || defaultRepFilters(); DB.ui.rep[t.dataset.repSel] = t.value; render(); return; }
      if (t.hasAttribute && t.hasAttribute('data-job-source')) { DB.ui = DB.ui || {}; DB.ui.jobSource = t.value; save(); render(); return; }
      if (t.matches && t.matches('input[data-importupload]')) { ingestFile(t.files[0], t.dataset.importSide); t.value = ''; return; }
      if (t.matches && t.matches('input[data-jobupload]')) { const f = t.files && t.files[0]; if (f) ingestJob(f); t.value = ''; return; }
      if (t.hasAttribute && t.hasAttribute('data-stg-status')) { DB.filters.stgStatus = t.value; render(); return; }
      if (t.hasAttribute && t.hasAttribute('data-stg-job')) { DB.filters.stgJobId = t.value; DB.filters.stgPage = 1; render(); return; }
      if (t.dataset.map && (t.dataset.map === 'src' || t.dataset.map === 'ledger' || t.dataset.map === 'transform')) { const m = (DB.mappings || []).find(x => x.id === t.dataset.id); if (m) { m[t.dataset.map] = t.value; if (t.dataset.map === 'transform' && !mapNeedsParam(t.value)) m.param = ''; } render(); return; }

      if (t.matches && t.matches('input[type=file][data-upload]')) {
        const cat = t.dataset.upcat || ($('#up-cat') && $('#up-cat').value) || 'other';
        const ref = t.dataset.upref || ($('#up-ref') && $('#up-ref').value) || null;
        handleFiles(t.files, cat, ref); t.value = ''; return;
      }
      if (t.dataset.txnSearch) { DB.filters.txnQ = t.value; render(); return; }
      if (t.dataset.txnStatus) { DB.filters.txnStatus = t.value; render(); return; }
      if (t.matches && t.matches('select[data-act="dih-select"]')) { DB.ui = DB.ui || {}; DB.ui.dihRecId = t.value; render(); return; }
      if (t.dataset.rf && (t.dataset.rf === 'ref' || t.dataset.rf === 'amode')) { applyRuleField(t); }
      if (t.dataset.arf && (t.dataset.arf === 'ref' || t.dataset.arf === 'amode')) { applyARRuleField(t); }
      if (t.hasAttribute && (t.hasAttribute('data-ar-exc-type') || t.hasAttribute('data-ar-exc-sort'))) {
        DB.ui = DB.ui || {}; DB.ui.arExcFilter = DB.ui.arExcFilter || { q: '', type: 'all', sort: 'amount-desc' };
        if (t.hasAttribute('data-ar-exc-type')) DB.ui.arExcFilter.type = t.value; else DB.ui.arExcFilter.sort = t.value;
        render(); return;
      }
    });
    document.addEventListener('keydown', e => {
      const t = e.target;
      if (t.dataset && t.dataset.txnSearch && e.key === 'Enter') { DB.filters.txnQ = t.value; render(); }
    });
    document.addEventListener('dragover', e => { const z = e.target.closest && e.target.closest('[data-dropzone],[data-import-dropzone],[data-job-dropzone]'); if (z) { e.preventDefault(); z.classList.add('border-accent'); } });
    document.addEventListener('dragleave', e => { const z = e.target.closest && e.target.closest('[data-dropzone],[data-import-dropzone],[data-job-dropzone]'); if (z) z.classList.remove('border-accent'); });
    document.addEventListener('drop', e => {
      const jz = e.target.closest && e.target.closest('[data-job-dropzone]');
      if (jz) { e.preventDefault(); jz.classList.remove('border-accent'); const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]; if (f) ingestJob(f); return; }
      const iz = e.target.closest && e.target.closest('[data-import-dropzone]');
      if (iz) { e.preventDefault(); iz.classList.remove('border-accent'); ingestFile(e.dataTransfer.files[0], iz.dataset.importSide); return; }
      const z = e.target.closest && e.target.closest('[data-dropzone]'); if (z) {
        e.preventDefault(); z.classList.remove('border-accent');
        const cat = z.dataset.upcat || ($('#up-cat') && $('#up-cat').value) || 'other';
        const ref = z.dataset.upref || ($('#up-ref') && $('#up-ref').value) || null;
        handleFiles(e.dataTransfer.files, cat, ref);
      }
    });
    function applyRuleField(t) {
      const rec = getRec(DB.route.recId); if (!rec) return; const rl = rec.rules.find(r => r.id === t.dataset.rule); if (!rl) return;
      const f = t.dataset.rf, v = t.value;
      if (f === 'name') rl.name = v;
      else if (f === 'ref') rl.cond.ref = v;
      else if (f === 'amode') { rl.cond.amount.mode = v; if (v === 'exact') rl.cond.amount.value = 0; }
      else if (f === 'aval') { rl.cond.amount.value = rl.cond.amount.mode === 'abs' ? Math.round((+v || 0) * 100) : (+v || 0); }
      else if (f === 'date') rl.cond.date.days = clamp(+v || 0, 0, 60);
      else if (f === 'conf') rl.confidence = clamp(+v || 50, 50, 100);
      // live update: re-render but keep editor open & focus
      const active = document.activeElement; const key = active && active.dataset ? active.dataset.rf : null; const rid = active && active.dataset ? active.dataset.rule : null; const pos = active ? active.selectionStart : null;
      render();
      if (key) { const ne = document.querySelector(`[data-rf="${key}"][data-rule="${rid}"]`); if (ne) { ne.focus(); try { if (pos != null && ne.setSelectionRange) ne.setSelectionRange(pos, pos); } catch (_) { } } }
    }
    function applyARRuleField(t) {
      const rec = getRec(DB.route.recId); if (!rec) return; const rl = (rec.arRules || []).find(r => r.id === t.dataset.rule); if (!rl) return;
      const f = t.dataset.arf, v = t.value;
      if (f === 'name') rl.name = v;
      else if (f === 'ref') rl.cond.ref = v;
      else if (f === 'amode') { rl.cond.amount.mode = v; if (v === 'exact') rl.cond.amount.value = 0; }
      else if (f === 'aval') { rl.cond.amount.value = rl.cond.amount.mode === 'abs' ? Math.round((+v || 0) * 100) : (+v || 0); }
      else if (f === 'date') rl.cond.date.days = clamp(+v || 0, 0, 60);
      else if (f === 'conf') rl.confidence = clamp(+v || 50, 50, 100);
      const active = document.activeElement; const key = active && active.dataset ? active.dataset.arf : null; const rid = active && active.dataset ? active.dataset.rule : null; const pos = active ? active.selectionStart : null;
      render();
      if (key) { const ne = document.querySelector(`[data-arf="${key}"][data-rule="${rid}"]`); if (ne) { ne.focus(); try { if (pos != null && ne.setSelectionRange) ne.setSelectionRange(pos, pos); } catch (_) { } } }
    }

    render();
  </script>
