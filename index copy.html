<!doctype html>
<html lang="en">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">

    tailwind.config = {
      theme: {
        extend: {
          colors: {
            canvas: 'var(--canvas)', surface: 'var(--surface)', sunken: 'var(--sunken)', raised: 'var(--raised)',
            ink: 'var(--ink)', 'ink-soft': 'var(--ink-soft)', muted: 'var(--muted)', faint: 'var(--faint)',
            line: 'var(--line)', 'line-soft': 'var(--line-soft)',

  <style>
    :root {
      --canvas: #F7F8FA;
      --surface: #FFFFFF;
      --sunken: #EEF0F4;
      --raised: #FFFFFF;
      --ink: #10131A;
      --ink-soft: #3A4150;
      --muted: #5B6472;
      --faint: #9AA2AF;
      --line: #E4E7EC;
      --line-soft: #EEF0F3;
      --accent: #4F46E5;
      --accent-soft: #EEF0FD;
      --accent-ink: #4338CA;
      --ok: #0E9F6E;
      --ok-soft: #E4F5EE;
      --ok-ink: #057A55;
      --warn: #D97706;
      --warn-soft: #FBF0E1;
      --warn-ink: #B45309;
      --bad: #DC2626;
      --bad-soft: #FCECEC;
      --bad-ink: #B91C1C;

    html,
    body {
      background: var(--canvas);
      color: var(--ink);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      font-size: 13px;
      line-height: 1.5;
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: #CDD3DC transparent;
    }

    *::-webkit-scrollbar {
      width: 9px;
      height: 9px;
    }

    *::-webkit-scrollbar-thumb {
      background: #CDD3DC;
      border-radius: 6px;
      border: 2px solid var(--canvas);
    }

    *::-webkit-scrollbar-thumb:hover {
      background: #B4BCC8;
    }

    .tnum {
      font-variant-numeric: tabular-nums;
    }

    .mono {
      font-family: 'IBM Plex Mono', ui-monospace, monospace;
      font-variant-numeric: tabular-nums;
    }

      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--faint);
    }

    .field {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
      color: var(--ink);
      outline: none;
      transition: border-color .12s, box-shadow .12s;
    }

    .field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

      appearance: none;

      background-repeat: no-repeat;
      background-position: right 8px center;
      padding-right: 28px;
    }

      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 34px;
      padding: 0 13px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background .12s, border-color .12s, color .12s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-ink);
    }

    .btn-ghost {
      background: transparent;
      color: var(--ink-soft);
      border-color: var(--line);
    }

    .btn-ghost:hover {
      background: var(--sunken);
    }

    .btn-sm {
      height: 28px;
      padding: 0 9px;
      font-size: 12px;
      font-weight: 500;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
    }

    .row-hover:hover {
      background: var(--sunken);
    }

    .seg {
      transition: width .5s cubic-bezier(.2, .7, .2, 1);
    }

    .num-anim {
      transition: color .3s;
    }

    [data-tip] {
      position: relative;
    }

    .switch {
      position: relative;
      width: 34px;
      height: 20px;
      border-radius: 999px;
      background: #CDD3DC;
      transition: background .15s;
      cursor: pointer;
      flex: none;
    }

    .switch[data-on="true"] {
      background: var(--accent);
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      transition: transform .15s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .2);
    }

    .switch[data-on="true"]::after {
      transform: translateX(14px);
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 4px;
      background: var(--sunken);
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid #fff;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .25);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 24px;
      padding: 0 8px;
      border-radius: 5px;
      font-size: 11.5px;
      font-weight: 500;
      background: var(--sunken);
      color: var(--ink-soft);
      border: 1px solid var(--line);
    }

    .fade-in {
      animation: fi .25s ease;
    }

    @keyframes fi {
      from {
        opacity: 0;
        transform: translateY(3px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .modal-back {
      background: rgba(16, 19, 26, .38);
      backdrop-filter: blur(2px);
    }
  </style>
</head>

    const icon = (k, cls = 'w-4 h-4') => `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${IC[k].split('M').filter(Boolean).map(p => `<path d="M${p}"/>`).join('')}</svg>`;

    // ═══════════════════════════════════════ seed ═══════════════════════════════════════

    const TYPE_META = {

    const _MERCH = ['Aster Goods', 'Volt Mobility', 'Nook Living', 'Pax Athletics', 'Ember Coffee', 'Rune Studio', 'Halo Beauty', 'Tidewell', 'Marrow & Co', 'Sable Home'];

    const RULESET = {

    const CADENCE = { payments: 'Daily', bank: 'Daily', close: 'Monthly', ar: 'Daily', ap: 'Weekly', payroll: 'Per pay run', inventory: 'Monthly', 'ar-reconciliation': 'Daily' };
    function genThreeway() {
      const v = _VEND.slice(0, 6); const out = []; for (let i = 0; i < 5; i++) {

    function genTax() {

    }
    // Sample dataset mirrors the AR reconciliation schema: customers, invoices, bank_statements,
    // payments + payment_allocations, and gl_control_balances. Amounts stored in cents (fmtMoney /100).

        { rule: { priority: 1, name: 'Bank ↔ Payment verification', enabled: true, confidence: 100, description: 'bank_txn_id exact match between bank_statements and payments' }, count: bankStatements.filter(b => b.clearingStatus === 'Reconciled').length },
        { rule: { priority: 2, name: 'Payment ↔ Invoice allocation', enabled: true, confidence: 100, description: 'payment_allocations connect received cash to specific invoices' }, count: ar.paymentAllocations.length },
        { rule: { priority: 3, name: 'Invoice settlement / short-pay', enabled: true, confidence: 100, description: 'allocated amount < invoice total → Disputed Invoice exception' }, count: shortPays.length },
        { rule: { priority: 4, name: 'Unapplied cash', enabled: true, confidence: 100, description: 'payment received with no customer or invoice allocation → Unapplied Payment exception' }, count: unapplied.length },
        { rule: { priority: 5, name: 'AR Sub-ledger ↔ GL control', enabled: true, confidence: 100, description: 'open invoice face value must equal GL control account 1200-AR' }, count: glMismatch ? 1 : 0 },
      ];

      return {
        invoices, payments, bankStatements, glControlBalances,
        matches, shortPays, overpays, unapplied, unmatchedInvoices, glMismatch, exceptions, perRule,
        rate, matchedVal, breakVal, breaks, matched,
        A: invoices.map((inv, i) => ({ id: `inv-${i}`, side: 'A', amount: inv.totalAmount, date: inv.issueDate, reference: inv.invoiceNumber, counterparty: cust(inv.customerId).companyName, memo: `Invoice ${inv.invoiceNumber}`, kind: 'invoice' })),
        B: payments.map((p, i) => ({ id: `pay-${i}`, side: 'B', amount: p.totalReceived, date: 'N/A', reference: p.paymentId, counterparty: p.customerId ? cust(p.customerId).companyName : 'Unknown', memo: p.paymentId, kind: 'payment' }))
      };
    }

    // ═══════════════════════════════════════ small components ═══════════════════════════════════════
    function statusPill(k) {
      const m = { matched: ['ok', 'Matched'], suggested: ['warn', 'Suggested'], break: ['bad', 'Break'], resolved: ['ok', 'Resolved'], writeoff: ['muted', 'Written off'], investigate: ['warn', 'Investigating'], journal: ['ok', 'Journal entry'] };
      const [t, l] = m[k] || ['muted', k];
      const bg = t === 'ok' ? 'bg-ok-soft text-ok-ink' : t === 'warn' ? 'bg-warn-soft text-warn-ink' : t === 'bad' ? 'bg-bad-soft text-bad-ink' : 'bg-sunken text-muted';
      return `<span class="inline-flex items-center gap-1 h-[20px] px-2 rounded text-[11px] font-semibold ${bg}">${l}</span>`;
    }
    function confBar(c) {
      const band = c >= 90 ? 'var(--ok)' : c >= 75 ? 'var(--accent)' : 'var(--warn)';
      const segs = [20, 40, 60, 80, 100].map(t => `<span style="width:5px;height:12px;border-radius:1px;background:${c >= t - 15 ? band : 'var(--sunken)'}"></span>`).join('');
      return `<span class="inline-flex items-center gap-2"><span class="inline-flex items-end gap-[2px]">${segs}</span><span class="mono text-[12px] text-ink-soft">${c}</span></span>`;
    }
    function matchRing(rate, size = 132) {
      const r = (size - 16) / 2, c = 2 * Math.PI * r, off = c * (1 - rate / 100);
      const col = rate >= 95 ? 'var(--ok)' : rate >= 80 ? 'var(--accent)' : 'var(--warn)';
      return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="block">
    <circle cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke="var(--sunken)" stroke-width="10"/>
    <circle cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke="${col}" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 ${size / 2} ${size / 2})" style="transition:stroke-dashoffset .6s cubic-bezier(.2,.7,.2,1),stroke .3s"/>
    <text x="50%" y="49%" text-anchor="middle" class="mono" font-size="26" font-weight="600" fill="var(--ink)">${rate.toFixed(1)}</text>
    <text x="50%" y="63%" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--faint)" letter-spacing=".08em">MATCH RATE %</text>
  </svg>`;
    }
    function closeRing(pct, size = 132) {
      const r = (size - 16) / 2, c = 2 * Math.PI * r, off = c * (1 - pct / 100);
      const col = pct >= 100 ? 'var(--ok)' : pct >= 60 ? 'var(--accent)' : 'var(--warn)';
      return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="block">
    <circle cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke="var(--sunken)" stroke-width="10"/>
    <circle cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke="${col}" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 ${size / 2} ${size / 2})" style="transition:stroke-dashoffset .6s cubic-bezier(.2,.7,.2,1),stroke .3s"/>
    <text x="50%" y="49%" text-anchor="middle" class="mono" font-size="26" font-weight="600" fill="var(--ink)">${pct}</text>
    <text x="50%" y="63%" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--faint)" letter-spacing=".08em">% READY</text>
  </svg>`;
    }
    function spark(vals, w = 120, h = 34) {
      const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx - mn || 1;
      const pts = vals.map((v, i) => `${(i / (vals.length - 1) * w).toFixed(1)},${(h - 4 - ((v - mn) / rng) * (h - 8)).toFixed(1)}`);
      const up = vals[vals.length - 1] >= vals[0];
      return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline fill="none" stroke="${up ? 'var(--ok)' : 'var(--warn)'}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" points="${pts.join(' ')}"/></svg>`;
    }
    function typeGlyph(type, cls = 'w-4 h-4') { return icon(TYPE_META[type].icon, cls); }

    // ═══════════════════════════════════════ shell ═══════════════════════════════════════
    function navItem(active, act, data, ico, label, badge) {
      return `<button data-act="${act}" ${data || ''} class="w-full flex items-center gap-2.5 px-2.5 h-9 rounded-md text-[13px] font-medium transition ${active ? 'bg-accent-soft text-accent-ink' : 'text-ink-soft hover:bg-sunken'}">
    <span class="${active ? 'text-accent' : 'text-faint'}">${icon(ico, 'w-[17px] h-[17px]')}</span><span class="flex-1 text-left">${label}</span>
    ${badge ? `<span class="mono text-[11px] ${active ? 'text-accent-ink' : 'text-faint'}">${badge}</span>` : ''}</button>`;
    }
    function shell(inner) {
      const r = DB.route;
      const totalBreaks = DB.recs.reduce((s, rc) => s + getEngineResult(rc).breaks.length, 0);
      return `<div class="flex h-screen overflow-hidden">
    <aside class="w-[236px] flex-none bg-surface border-r border-line flex flex-col">

      </div>
      <div class="p-2.5 border-t border-line flex items-center gap-2.5">

  </div>

    }
    function topbar(title, sub, actions) {
      return `<header class="h-[52px] flex-none flex items-center gap-3 px-6 border-b border-line bg-surface">
    <div class="min-w-0"><div class="font-bold text-[15px] tracking-tight truncate">${title}</div>${sub ? `<div class="text-[11.5px] text-muted -mt-0.5 truncate">${sub}</div>` : ''}</div>
    <div class="ml-auto flex items-center gap-2">${actions || ''}</div></header>`;
    }

    // ═══════════════════════════════════════ view: dashboard ═══════════════════════════════════════
    function kpi(label, value, sub) {
      return `<div class="card p-4">
    <div class="lbl">${label}</div>
    <div class="mono text-[24px] font-semibold mt-1.5 leading-none">${value}</div>
    <div class="text-[11.5px] text-muted mt-1.5">${sub || ''}</div></div>`;
    }
    function toINR(a) { return a.currency === 'USD' ? Math.round(a.balance * 83.2) : a.currency === 'EUR' ? Math.round(a.balance * 90.1) : a.currency === 'GBP' ? Math.round(a.balance * 105.3) : a.currency === 'SGD' ? Math.round(a.balance * 61.8) : a.balance; }
    function viewDashboard() {
      const all = DB.recs.map(rc => ({ rc, res: getEngineResult(rc) }));
      const totBreaks = all.reduce((s, x) => s + x.res.breaks.length, 0);
      const totVal = all.reduce((s, x) => s + x.res.breakVal, 0);
      const avgRate = +(all.reduce((s, x) => s + x.res.rate, 0) / all.length).toFixed(1);
      const ready = all.filter(x => x.res.breaks.length === 0).length;
      const closePct = +(ready / all.length * 100).toFixed(0);
      const cashAccts = DB.accounts.filter(a => a.kind !== 'gateway');
      const cashTotal = cashAccts.reduce((s, a) => s + toINR(a), 0);
      const queue = []; all.forEach(({ rc, res }) => res.breaks.forEach(r => queue.push({ rc, r })));
      queue.sort((x, y) => Math.abs(y.r.amount) - Math.abs(x.r.amount));
      const kindChip = k => ({ checking: 'Checking', savings: 'Savings', card: 'Card', gateway: 'Gateway' }[k] || k);
      const failedSyncs = DB.accounts.filter(a => a.status !== 'connected').length;
      const highValue = queue.filter(x => Math.abs(x.r.amount) >= 2000000).length;
      const inner = topbar('Dashboard', `Reconciliation control tower · ${esc(DB.period.label)}`,
        `<button data-act="new-recon" class="btn btn-primary">${icon('plus', 'w-4 h-4')}New reconciliation</button>`)
        + `<div class="flex-1 overflow-y-auto p-6 fade-in">
    <div class="grid grid-cols-4 gap-3 mb-5">
      ${kpi('Auto-match rate', avgRate + '%', `Across ${all.length} reconciliations`)}
      ${kpi('Open exceptions', totBreaks, fmtMoney(totVal) + ' unreconciled value')}
      ${kpi('High-value exceptions', highValue, highValue ? 'Requires controller attention' : 'No material exposure')}
      ${kpi('Close readiness', closePct + '%', `${ready} ready · ${failedSyncs} failed import${failedSyncs === 1 ? '' : 's'}`)}
    </div>
    <div class="grid grid-cols-3 gap-5 mb-5">
      <div class="col-span-2 card overflow-hidden">
        <div class="flex items-center px-4 h-11 border-b border-line"><div><div class="font-semibold text-[13px]">Data source health</div><div class="text-[11px] text-muted">Connection and import readiness</div></div>
          <button data-act="goto" data-r="ingestion" class="ml-auto btn btn-ghost btn-sm">Manage data ${icon('arrowr', 'w-3.5 h-3.5')}</button></div>
        <table class="w-full text-[13px]"><tbody>
          ${DB.accounts.map(a => `<tr class="border-b border-line-soft last:border-0">
            <td class="px-4 py-2.5"><div class="font-medium">${esc(a.institution)} · ${esc(a.name)}</div><div class="text-[11px] text-faint">${kindChip(a.kind)} · ${a.currency}</div></td>
            <td class="px-3 py-2.5">${a.status === 'connected' ? `<span class="inline-flex items-center gap-1.5 text-[11.5px] text-muted"><span class="w-1.5 h-1.5 rounded-full bg-ok"></span>synced ${a.sync}</span>` : `<span class="inline-flex items-center gap-1.5 text-[11.5px] text-warn-ink"><span class="w-1.5 h-1.5 rounded-full bg-warn"></span>pending</span>`}</td>
            <td class="px-4 py-2.5 text-right mono font-semibold ${a.balance < 0 ? 'text-bad-ink' : ''}">${fmtMoney(a.balance, a.currency)}</td></tr>`).join('')}
        </tbody><tfoot><tr class="border-t border-line"><td class="px-4 py-2.5 lbl">Total (INR equiv.)</td><td></td><td class="px-4 py-2.5 text-right mono font-bold text-[14px]">${fmtMoney(cashTotal)}</td></tr></tfoot></table>
      </div>
      <div class="card p-5 flex flex-col items-center">
        <div class="lbl self-start mb-2">Close progress</div>
        ${closeRing(closePct)}
        <div class="mt-3 text-[12.5px] text-muted text-center">${ready} of ${all.length} reconciliations at zero breaks</div>
        <button data-act="goto" data-r="close" class="btn btn-ghost w-full justify-center mt-4">Open period close ${icon('arrowr', 'w-3.5 h-3.5')}</button>
      </div>
    </div>
    <div class="card overflow-hidden mb-5">
      <div class="flex items-center px-4 h-11 border-b border-line"><div class="font-semibold text-[13px]">Priority exceptions</div>
        <div class="ml-auto text-[11.5px] text-muted">${queue.length} open · highest value first</div></div>
      ${queue.length ? `<table class="w-full text-[13px]"><tbody>
        ${queue.slice(0, 6).map(({ rc, r }) => `<tr class="border-b border-line-soft last:border-0 row-hover cursor-pointer" data-act="open-recon-tab" data-id="${rc.id}" data-t="exceptions">
          <td class="px-4 py-2.5"><span class="w-1.5 h-1.5 rounded-full inline-block ${Math.abs(r.amount) > 20000 ? 'bg-bad' : 'bg-warn'}"></span></td>
          <td class="px-2 py-2.5"><div class="font-medium">${esc(r.counterparty)}</div><div class="text-[11px] text-faint">${esc(rc.name)}</div></td>
          <td class="px-3 py-2.5 text-[12px] text-muted">${esc(breakReason(rc, r))}</td>
          <td class="px-3 py-2.5 mono text-faint text-[12px]">${fmtDate(r.date)}</td>
          <td class="px-4 py-2.5 text-right mono font-semibold ${r.amount < 0 ? 'text-bad-ink' : ''}">${fmtMoney(r.amount, r.currency)}</td>
          <td class="px-3 text-faint">${icon('chevR', 'w-4 h-4')}</td></tr>`).join('')}
      </tbody></table>`: `<div class="px-4 py-8 text-center text-[13px] text-muted">No open exceptions — all reconciliations clear.</div>`}
    </div>
    <div class="card overflow-hidden">
      <div class="flex items-center px-4 h-11 border-b border-line"><div class="font-semibold text-[13px]">Reconciliations</div>

      <table class="w-full text-[13px]"><thead>
        <tr class="text-left lbl border-b border-line">

          <th class="font-semibold px-3 py-2">Trend</th><th class="font-semibold px-3 py-2 text-right">Breaks</th>
          <th class="font-semibold px-3 py-2 text-right">Value at risk</th><th class="w-8"></th></tr></thead><tbody>
        ${all.map(({ rc, res }) => `<tr class="border-b border-line-soft row-hover cursor-pointer" data-act="open-recon" data-id="${rc.id}">
          <td class="px-4 py-2.5"><div class="font-semibold">${esc(rc.name)}</div><div class="text-[11px] text-faint">Owner · ${esc(rc.owner)}</div></td>
          <td class="px-3 py-2.5"><span class="chip">${typeGlyph(rc.type, 'w-3.5 h-3.5')}${TYPE_META[rc.type].label}</span></td>
          <td class="px-3 py-2.5 text-muted">${rc.cadence}</td>
          <td class="px-3 py-2.5 text-right"><span class="mono font-semibold ${res.rate >= 95 ? 'text-ok-ink' : res.rate >= 80 ? 'text-ink' : 'text-warn-ink'}">${res.rate.toFixed(1)}%</span></td>
          <td class="px-3 py-2.5">${rc.lastRun ? spark(rc.lastRun.history) : ''}</td>
          <td class="px-3 py-2.5 text-right">${res.breaks.length ? `<span class="mono font-semibold text-warn-ink">${res.breaks.length}</span>` : `<span class="mono text-faint">0</span>`}</td>
          <td class="px-3 py-2.5 text-right mono ${res.breakVal ? 'text-ink-soft' : 'text-faint'}">${fmtMoney(res.breakVal)}</td>
          <td class="px-2 text-faint">${icon('chevR', 'w-4 h-4')}</td></tr>`).join('')}
      </tbody></table></div>
  </div>`;
      return inner;
    }

    // ═══════════════════════════════════════ view: reconciliation ═══════════════════════════════════════
    const RECON_TABS = [['overview', 'Overview'], ['rules', 'Rules Studio'], ['matches', 'Matches'], ['exceptions', 'Exceptions'], ['sources', 'Sources']];
    const AR_RECON_TABS = [['overview', 'Overview'], ['rules', 'Rules Studio'], ['matches', 'Matched'], ['exceptions', 'Exceptions']];
    function viewRecon() {
      const rec = getRec(DB.route.recId); if (!rec) return viewDashboard();
      const isAR = rec.type === 'ar-reconciliation';
      const tab = DB.route.tab || 'overview';
      const res = getEngineResult(rec);

      const runBtn = `<button data-act="run-recon" data-id="${rec.id}" class="btn btn-primary">${icon('play', 'w-4 h-4')}Run reconciliation</button>`;
      const lastRun = rec.lastRun ? `<span class="text-[11.5px] text-muted mono">last run ${rec.lastRun.at.replace('T', ' ')}</span>` : '';
      let body = '';
      const tabs = isAR ? AR_RECON_TABS : RECON_TABS;
      const exceptionsCount = isAR ? res.exceptions.length : res.breaks.length;
      if (tab === 'overview') body = isAR ? arReconOverview(rec, res) : reconOverview(rec, res);
      else if (tab === 'rules') body = isAR ? arReconRules(rec, res) : reconRules(rec, res);
      else if (tab === 'matches') body = isAR ? arReconMatches(rec, res) : reconMatches(rec, res);

      else if (tab === 'sources' && !isAR) body = reconSources(rec, res);
      return topbar(esc(rec.name), `${meta.a} <span class="text-faint">↔</span> ${meta.b} · ${rec.cadence}`, `${lastRun}${runBtn}`)
        + `<div class="flex-none px-6 border-b border-line bg-surface flex items-center gap-1">
      ${tabs.map(([k, l]) => `<button data-act="recon-tab" data-t="${k}" class="h-10 px-3 text-[13px] font-medium border-b-2 -mb-px transition ${tab === k ? 'border-accent text-accent-ink' : 'border-transparent text-muted hover:text-ink'}">${l}${k === 'exceptions' && exceptionsCount ? ` <span class="mono text-[11px] text-warn-ink">${exceptionsCount}</span>` : ''}</button>`).join('')}
    </div><div class="flex-1 overflow-y-auto fade-in">${body}</div>`;
    }

    // ═══════════════════════════════════════ views: work queues ═══════════════════════════════════════
    function recStatus(rc, res) {
      if (res.breaks.length === 0) return 'Review ready';

      return 'Needs resolution';
    }
    function viewMyWork() {
      const all = DB.recs.map(rc => ({ rc, res: getEngineResult(rc) }));
      const mine = all.filter(x => x.rc.owner === DB.user.name);
      const ordered = [...mine, ...all.filter(x => x.rc.owner !== DB.user.name)].slice(0, 6);
      const task = x => {
        const { rc, res } = x; const action = res.breaks.length ? 'Resolve exceptions' : res.rate < 95 ? 'Prepare reconciliation' : 'Review & submit'; return `<tr class="border-b border-line-soft row-hover cursor-pointer" data-act="open-recon" data-id="${rc.id}">
    <td class="px-4 py-3"><div class="font-semibold">${esc(rc.name)}</div><div class="text-[11px] text-faint">${TYPE_META[rc.type].label} · ${rc.cadence}</div></td>
    <td class="px-3 py-3"><span class="chip">${esc(rc.owner === DB.user.name ? 'Assigned to me' : 'Waiting on ' + rc.owner.split(' ')[0])}</span></td>
    <td class="px-3 py-3"><div class="font-medium ${res.breaks.length ? 'text-warn-ink' : 'text-ok-ink'}">${action}</div><div class="text-[11px] text-faint">${res.breaks.length ? res.breaks.length + ' open exception' + (res.breaks.length === 1 ? '' : 's') : res.rate.toFixed(1) + '% matched'}</div></td>
    <td class="px-3 py-3 mono text-[12px] ${res.breaks.length ? 'text-warn-ink' : 'text-muted'}">${res.breaks.length ? fmtMoney(res.breakVal) : 'Ready'}</td>
    <td class="px-4 py-3 text-right text-[12px] font-medium ${res.breaks.length ? 'text-warn-ink' : 'text-muted'}">${res.breaks.length ? 'Due today' : 'Due Jul 22'}</td></tr>`;
      };
      return topbar('My work', 'Tasks assigned to you and items waiting for your review', '') + `<div class="flex-1 overflow-y-auto p-6 fade-in">

    <div class="card overflow-hidden mb-5"><div class="h-12 px-4 flex items-center border-b border-line"><div><div class="font-semibold text-[13px]">Your task queue</div><div class="text-[11px] text-muted">Filter by assignment, role, or due date</div></div><div class="ml-auto flex gap-2"><button class="btn btn-ghost btn-sm">Assigned to me</button><button class="btn btn-ghost btn-sm">Due this week</button></div></div><table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line"><th class="px-4 py-2">Reconciliation</th><th class="px-3 py-2">Assignment</th><th class="px-3 py-2">Next action</th><th class="px-3 py-2">Exposure</th><th class="px-4 py-2 text-right">Due</th></tr></thead><tbody>${ordered.map(task).join('')}</tbody></table></div>

    function viewReconciliations() {
      const all = DB.recs.map(rc => ({ rc, res: getEngineResult(rc) }));

.breaks.length}</td><td class="px-3 py-3 text-right mono">${fmtMoney(res.breakVal)}</td><td class="px-4 py-3 text-right text-muted">Jul ${20 + ((rc.name.length) % 5)}</td></tr>`).join('')}</tbody></table></div></div>`;

    function viewTransactions() {
      const txnStatus = (rc, r) => { const e = getEngineResult(rc); if (r.resolution) return 'resolved'; if (e.matched.some(m => m.aId === r.id || m.bId === r.id)) return 'matched'; if (e.suggested.some(m => m.aId === r.id || m.bId === r.id)) return 'suggested'; return 'break'; };
      const q = (DB.filters.txnQ || '').toLowerCase(), filter = DB.filters.txnStatus || 'all';
      const rows = DB.recs.flatMap(rc => rc.records.map(r => ({ rc, r, status: txnStatus(rc, r) }))).filter(x => filter === 'all' || x.status === filter).filter(x => !q || [x.r.counterparty, x.r.memo, x.r.reference, fmtMoney(x.r.amount, x.r.currency), x.rc.name].join(' ').toLowerCase().includes(q)).slice(0, 100);
      return topbar('Transactions', 'Forensic search across normalized source records', '') + `<div class="flex-1 overflow-y-auto p-6 fade-in"><div class="flex items-center gap-2 mb-2"><div class="relative flex-1 max-w-md"><span class="absolute left-3 top-2 text-faint">${icon('search', 'w-4 h-4')}</span><input data-txn-search class="field pl-9" value="${esc(DB.filters.txnQ || '')}" placeholder="Search reference, counterparty, amount, or reconciliation"></div><select data-txn-status class="field w-[170px]"><option value="all">All statuses</option><option value="matched" ${filter === 'matched' ? 'selected' : ''}>Matched</option><option value="suggested" ${filter === 'suggested' ? 'selected' : ''}>Suggested</option><option value="break" ${filter === 'break' ? 'selected' : ''}>Exception</option><option value="resolved" ${filter === 'resolved' ? 'selected' : ''}>Resolved</option></select></div><div class="text-[12px] text-muted mb-4">${rows.length} transaction${rows.length === 1 ? '' : 's'} shown · click a row to inspect source, matching, and activity history</div><div class="card overflow-hidden"><table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line"><th class="px-4 py-2">Transaction</th><th class="px-3 py-2">Source</th><th class="px-3 py-2">Reference</th><th class="px-3 py-2">Reconciliation</th><th class="px-3 py-2">Status</th><th class="px-4 py-2 text-right">Amount</th></tr></thead><tbody>${rows.length ? rows.map(({ rc, r, status }) => `<tr data-act="open-transaction" data-rec="${rc.id}" data-record="${r.id}" class="border-b border-line-soft row-hover cursor-pointer"><td class="px-4 py-2.5"><div class="font-medium">${esc(r.counterparty)}</div><div class="text-[11px] text-faint">${esc(r.memo)}</div></td><td class="px-3 py-2.5"><span class="chip">${r.side === 'A' ? TYPE_META[rc.type].aKind : TYPE_META[rc.type].bKind}</span></td><td class="px-3 py-2.5 mono text-[12px] text-muted">${esc(r.reference || '—')}</td><td class="px-3 py-2.5 text-muted">${esc(rc.name)}</td><td class="px-3 py-2.5">${statusPill(status)}</td><td class="px-4 py-2.5 text-right mono font-semibold">${fmtMoney(r.amount, r.currency)}</td></tr>`).join('') : `<tr><td colspan="6" class="px-4 py-12 text-center text-muted">No transactions match the current search and status filter.</td></tr>`}</tbody></table></div></div>`;
    }

    function twistCard(rec, res) {
      if (rec.type === 'ar') {
        const inv = rec.records.filter(r => r.side === 'B'); const T = todayISO();
        const buck = [['Current', 0, 30, 0], ['31–60 days', 31, 60, 0], ['61–90 days', 61, 90, 0], ['90+ days', 91, 99999, 0]];
        inv.forEach(r => { const age = Math.abs(dateDiff(T, r.date)); const b = buck.find(x => age >= x[1] && age <= x[2]); if (b) b[3] += Math.abs(r.amount); });
        return `<div class="col-span-3 card overflow-hidden"><div class="px-4 h-11 flex items-center border-b border-line"><div class="font-semibold text-[13px]">Invoice aging</div><div class="ml-auto text-[11.5px] text-muted">Open receivables by age · disputes routed to Exceptions</div></div>
      <div class="grid grid-cols-4 divide-x divide-line">${buck.map(([l, , , v], i) => `<div class="p-4"><div class="lbl">${l}</div><div class="mono text-[20px] font-semibold mt-1 ${i >= 2 ? 'text-warn-ink' : ''}">${fmtMoney(v)}</div></div>`).join('')}</div></div>`;
      }
      if (rec.type === 'payroll' && rec.tax) {
        return `<div class="col-span-3 card overflow-hidden"><div class="px-4 h-11 flex items-center border-b border-line"><div class="font-semibold text-[13px]">Tax liabilities</div><div class="ml-auto text-[11.5px] text-muted">Accrued vs. paid by jurisdiction</div></div>
      <table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line"><th class="px-4 py-2 font-semibold">Jurisdiction</th><th class="px-3 py-2 font-semibold text-right">Accrued</th><th class="px-3 py-2 font-semibold text-right">Paid</th><th class="px-3 py-2 font-semibold text-right">Variance</th><th class="px-4 py-2 font-semibold">Status</th></tr></thead><tbody>
      ${rec.tax.map(t => `<tr class="border-b border-line-soft"><td class="px-4 py-2.5 font-medium">${t.jur}</td><td class="px-3 py-2.5 text-right mono">${fmtMoney(t.accrued)}</td><td class="px-3 py-2.5 text-right mono">${fmtMoney(t.paid)}</td><td class="px-3 py-2.5 text-right mono ${t.accrued - t.paid ? 'text-warn-ink' : 'text-faint'}">${fmtMoney(t.accrued - t.paid)}</td><td class="px-4 py-2.5">${t.status === 'ok' ? '<span class="text-ok-ink text-[12px] font-medium">Reconciled</span>' : '<span class="text-warn-ink text-[12px] font-medium">Variance</span>'}</td></tr>`).join('')}
      </tbody></table></div>`;
      }
      if ((rec.type === 'ap' || rec.type === 'inventory') && rec.threeway) {
        return `<div class="col-span-3 card overflow-hidden"><div class="px-4 h-11 flex items-center border-b border-line"><div class="font-semibold text-[13px]">Three-way match</div><div class="ml-auto text-[11.5px] text-muted">Purchase order · goods receipt · vendor invoice</div></div>
      <table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line"><th class="px-4 py-2 font-semibold">PO</th><th class="px-3 py-2 font-semibold">Vendor</th><th class="px-3 py-2 font-semibold text-right">PO amt</th><th class="px-3 py-2 font-semibold text-right">Received</th><th class="px-3 py-2 font-semibold text-right">Invoiced</th><th class="px-4 py-2 font-semibold">Status</th></tr></thead><tbody>
      ${rec.threeway.map(t => `<tr class="border-b border-line-soft"><td class="px-4 py-2.5 mono">${t.po}</td><td class="px-3 py-2.5 font-medium">${esc(t.vendor)}</td>
        <td class="px-3 py-2.5 text-right mono">${fmtMoney(t.poAmt)}</td>
        <td class="px-3 py-2.5 text-right mono ${t.grAmt == null ? 'text-bad-ink' : ''}">${t.grAmt == null ? '— missing' : fmtMoney(t.grAmt)}</td>
        <td class="px-3 py-2.5 text-right mono ${t.invAmt !== t.poAmt ? 'text-warn-ink' : ''}">${fmtMoney(t.invAmt)}</td>
        <td class="px-4 py-2.5">${t.status === 'matched' ? '<span class="text-ok-ink text-[12px] font-medium">3-way matched</span>' : t.status === 'missing-gr' ? '<span class="text-bad-ink text-[12px] font-medium">Missing receipt</span>' : '<span class="text-warn-ink text-[12px] font-medium">Price variance</span>'}</td></tr>`).join('')}
      </tbody></table></div>`;
      }
      return '';
    }

    function arReconOverview(rec, res) {

      const matchRate = (res.matched.length / (res.invoices.length + res.payments.length) * 100).toFixed(1);
      return `<div class="p-6 fade-in">
        <div class="grid grid-cols-4 gap-3 mb-5">
          ${kpi_('Total invoices', res.invoices.length, fmtMoney(res.invoices.reduce((s,i)=>s+i.totalAmount,0)*100)+' billed')}
          ${kpi_('Matched', res.matches.length, `${matchRate}% reconciled`)}
          ${kpi_('Open exceptions', res.exceptions.length, `${res.exceptions.filter(e=>e.status==='Open').length} unresolved`)}

          <div class="text-[12px] text-warn-ink mt-1">Sub-ledger ${fmtMoney(res.glMismatch.subledgerBalance*100)} vs GL ${fmtMoney(res.glMismatch.glBalance*100)} = ${fmtMoney(res.glMismatch.variance*100)} variance</div></div></div></div>` : ''}

          <tr class="border-b border-line-soft"><td class="px-4 py-2.5 font-medium">Fully matched (Paid)</td><td class="px-3 py-2.5">${res.matches.length}</td><td class="px-3 py-2.5 text-right mono">${fmtMoney(res.matches.reduce((s,m)=>s+m.amount,0)*100)}</td><td class="px-4 py-2.5 text-right">${statusPill('matched')}</td></tr>

          <tr class="border-b border-line-soft"><td class="px-4 py-2.5 font-medium">Short-payments</td><td class="px-3 py-2.5">${res.shortPays.length}</td><td class="px-3 py-2.5 text-right mono text-warn-ink">${fmtMoney(res.shortPays.reduce((s,p)=>s+p.shortage,0)*100)}</td><td class="px-4 py-2.5 text-right">${statusPill('break')}</td></tr>
          <tr class="border-b border-line-soft"><td class="px-4 py-2.5 font-medium">No payment received (Open)</td><td class="px-3 py-2.5">${res.unmatchedInvoices.length}</td><td class="px-3 py-2.5 text-right mono">${fmtMoney(res.unmatchedInvoices.reduce((s,i)=>s+i.totalAmount,0)*100)}</td><td class="px-4 py-2.5 text-right"><span class="chip">Open · not yet due</span></td></tr>
          <tr><td class="px-4 py-2.5 font-medium">Unapplied cash</td><td class="px-3 py-2.5">${res.unapplied.length}</td><td class="px-3 py-2.5 text-right mono text-warn-ink">${fmtMoney(res.unapplied.reduce((s,u)=>s+u.amount,0)*100)}</td><td class="px-4 py-2.5 text-right">${statusPill('break')}</td></tr>
        </tbody></table></div>
        <div class="card overflow-hidden mb-5"><div class="px-4 h-11 flex items-center border-b border-line"><div class="font-semibold text-[13px]">Bank statement clearing</div><div class="ml-auto text-[11.5px] text-muted">Phase 2a · bank_statements.clearing_status</div></div>
        <table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line"><th class="px-4 py-2">Bank txn</th><th class="px-3 py-2">Reference</th><th class="px-3 py-2">Payer</th><th class="px-3 py-2 text-right">Amount</th><th class="px-4 py-2 text-right">Status</th></tr></thead><tbody>
        ${res.bankStatements.map(bs => `<tr class="border-b border-line-soft last:border-0"><td class="px-4 py-2.5 font-medium">${bs.bankTxnId}</td><td class="px-3 py-2.5 mono text-[12px] text-muted">${bs.bankReferenceNumber}</td><td class="px-3 py-2.5">${esc(bs.payerName)}</td><td class="px-3 py-2.5 text-right mono">${fmtMoney(bs.amount*100)}</td><td class="px-4 py-2.5 text-right">${bs.clearingStatus==='Reconciled'?statusPill('matched'):statusPill('break')}</td></tr>`).join('')}
        </tbody></table></div>
        <div class="card overflow-hidden">
          <div class="flex items-center px-4 h-11 border-b border-line"><div><div class="font-semibold text-[13px]">Rule performance</div><div class="text-[11px] text-faint">Calculations run internally against the seeded AR dataset</div></div><button data-act="recon-tab" data-t="rules" class="ml-auto btn btn-ghost btn-sm">Open Rules Studio ${icon('arrowr','w-3.5 h-3.5')}</button></div>
          <table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line"><th class="px-4 py-2">#</th><th class="px-3 py-2">Rule / calculation</th><th class="px-3 py-2">Logic</th><th class="px-3 py-2 text-right">Results</th><th class="px-3 py-2">Status</th></tr></thead><tbody>
          ${res.perRule.map(({rule,count})=>`<tr class="border-b border-line-soft last:border-0"><td class="px-4 py-2.5 mono text-faint">${rule.priority}</td><td class="px-3 py-2.5 font-medium">${rule.name}</td><td class="px-3 py-2.5 text-muted text-[12px]">${rule.description}</td><td class="px-3 py-2.5 text-right mono font-semibold">${count}</td><td class="px-3 py-2.5"><span class="text-ok-ink text-[12px] font-medium">● Active</span></td></tr>`).join('')}

    function arReconRules(rec, res) {
      return `<div class="p-6 fade-in">
        <div class="flex items-center mb-4"><div><div class="font-semibold text-[14px]">AR reconciliation rules</div><div class="text-[12px] text-muted">Evaluated as a fixed end-to-end AR control process across the Data Hub datasets — not user-editable like the generic engine's rules.</div></div></div>
        <div class="space-y-3">${res.perRule.map(({rule,count})=>`<div class="card p-4 flex items-start gap-4">
          <div class="w-8 h-8 rounded border border-line flex items-center justify-center mono text-faint flex-none">${rule.priority}</div>

    function arReconMatches(rec, res) {

      <table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line"><th class="px-4 py-2">Invoice</th><th class="px-3 py-2">Customer</th><th class="px-3 py-2">Amount</th><th class="px-3 py-2">Payment</th><th class="px-4 py-2 text-right">Status</th></tr></thead><tbody>

    function arReconExceptions(rec, res) {
      const typeBadge = t => {
        const m = { 'Timing Difference': 'bg-sunken text-muted', 'Unapplied Payment': 'bg-warn-soft text-warn-ink', 'Disputed Invoice': 'bg-bad-soft text-bad-ink', 'GL Mismatch': 'bg-bad-soft text-bad-ink' };
        return `<span class="inline-flex items-center h-[20px] px-2 rounded text-[11px] font-semibold ${m[t]||'bg-sunken text-muted'}">${t}</span>`;
      };
      return `<div class="p-6 fade-in">
      <div class="card overflow-hidden mb-4"><div class="px-4 h-11 flex items-center border-b border-line"><div class="font-semibold text-[13px]">Reconciliation exceptions (${res.exceptions.length})</div><div class="ml-auto text-[11.5px] text-muted">Phase 3 · reconciliation_exceptions log</div></div>
      <table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line"><th class="px-4 py-2">Exception ID</th><th class="px-3 py-2">Type</th><th class="px-3 py-2">Related record</th><th class="px-3 py-2">Description</th><th class="px-3 py-2 text-right">Amount</th><th class="px-4 py-2 text-right">Status</th></tr></thead><tbody>
      ${res.exceptions.length ? res.exceptions.map(e => `<tr class="border-b border-line-soft last:border-0"><td class="px-4 py-2.5 font-medium mono text-[12px]">${e.id}</td><td class="px-3 py-2.5">${typeBadge(e.type)}</td><td class="px-3 py-2.5 mono text-[12px] text-muted">${e.relatedId}</td><td class="px-3 py-2.5 text-ink-soft">${esc(e.description)}</td><td class="px-3 py-2.5 text-right mono font-semibold text-bad-ink">${fmtMoney(e.amount*100)}</td><td class="px-4 py-2.5 text-right">${e.status==='Resolved'?statusPill('resolved'):statusPill('break')}</td></tr>`).join('') : `<tr><td colspan="6" class="px-4 py-8 text-center text-muted">No open exceptions — everything reconciled.</td></tr>`}
      </tbody></table></div>
      ${res.unmatchedInvoices.length ? `<div class="card overflow-hidden"><div class="px-4 h-11 flex items-center border-b border-line"><div class="font-semibold text-[13px]">Open invoices awaiting payment (${res.unmatchedInvoices.length})</div><div class="ml-auto text-[11.5px] text-muted">Not logged as an exception — simply not yet paid</div></div>
      <table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line"><th class="px-4 py-2">Invoice</th><th class="px-3 py-2">Customer</th><th class="px-3 py-2">Due date</th><th class="px-3 py-2 text-right">Amount</th></tr></thead><tbody>
      ${res.unmatchedInvoices.map(ui => {const c=rec.arData.customers.find(x=>x.customerId===ui.customerId);return `<tr class="border-b border-line-soft last:border-0"><td class="px-4 py-2.5 font-medium">${ui.invoiceNumber}</td><td class="px-3 py-2.5">${esc(c.companyName)}</td><td class="px-3 py-2.5 text-muted">${fmtDate(ui.dueDate)}</td><td class="px-3 py-2.5 text-right mono">${fmtMoney(ui.totalAmount*100)}</td></tr>`;}).join('')}
      </tbody></table></div>` : ''}
      </div>`;
    }

    function reconOverview(rec, res) {
      const auto = res.matches.length ? Math.round(res.matched.length / res.matches.length * 100) : 0;
      return `<div class="p-6 grid grid-cols-3 gap-5">
    <div class="card p-5 flex flex-col items-center justify-center">${matchRing(res.rate, 148)}
      <div class="mt-3 text-[12px] text-muted text-center">${res.matched.length} of ${res.total} items matched</div></div>
    <div class="col-span-2 grid grid-cols-2 gap-3 content-start">
      ${kpi('Matched', res.matched.length, fmtMoney(res.matchedVal) + ' reconciled')}
      ${kpi('Suggested', res.suggested.length, 'below ' + rec.threshold + '% confidence')}
      ${kpi('Breaks', res.breaks.length, fmtMoney(res.breakVal) + ' at risk')}
      ${kpi('Auto-match', auto + '%', 'no human touch')}
    </div>
    ${twistCard(rec, res)}
    <div class="col-span-3 card overflow-hidden">
      <div class="flex items-center px-4 h-11 border-b border-line"><div class="font-semibold text-[13px]">Rule performance</div>
        <button data-act="recon-tab" data-t="rules" class="ml-auto btn btn-ghost btn-sm">Open Rules Studio ${icon('arrowr', 'w-3.5 h-3.5')}</button></div>
      <table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line">
        <th class="px-4 py-2 font-semibold">#</th><th class="px-3 py-2 font-semibold">Rule</th>
        <th class="px-3 py-2 font-semibold">Conditions</th><th class="px-3 py-2 font-semibold text-right">Confidence</th>
        <th class="px-3 py-2 font-semibold text-right">Matched</th><th class="px-3 py-2 font-semibold">Status</th></tr></thead><tbody>
        ${res.perRule.map(({ rule, count }) => `<tr class="border-b border-line-soft">
          <td class="px-4 py-2.5 mono text-faint">${rule.priority}</td>
          <td class="px-3 py-2.5 font-medium">${esc(rule.name)}</td>
          <td class="px-3 py-2.5">${condChips(rule.cond)}</td>
          <td class="px-3 py-2.5 text-right">${confBar(rule.confidence)}</td>
          <td class="px-3 py-2.5 text-right mono font-semibold">${count}</td>
          <td class="px-3 py-2.5">${rule.enabled ? '<span class="text-ok-ink text-[12px] font-medium">● Active</span>' : '<span class="text-faint text-[12px]">○ Off</span>'}</td></tr>`).join('')}
      </tbody></table></div></div>`;
    }
    function condChips(c) {
      const out = [];
      out.push(`<span class="chip">Ref: ${c.ref === 'exact' ? 'exact' : c.ref === 'fuzzy' ? 'fuzzy' : 'ignore'}</span>`);
      out.push(`<span class="chip">Amt: ${c.amount.mode === 'exact' ? 'exact' : c.amount.mode === 'pct' ? '±' + c.amount.value + '%' : '±' + fmtMoney(c.amount.value)}</span>`);
      out.push(`<span class="chip">Date: ±${c.date.days}d</span>`);
      return `<span class="flex flex-wrap gap-1.5">${out.join('')}</span>`;
    }

    // ── HERO: Rules Studio ──
    function reconRules(rec, res) {
      const base = rec.lastRun ? rec.lastRun.rate : res.rate;
      const delta = +(res.rate - base).toFixed(1);
      const dirty = !rec.lastRun || Math.abs(delta) > 0.05 || engineChanged(rec);
      return `<div class="flex h-full">
    <div class="flex-1 min-w-0 overflow-y-auto p-6">
      <div class="flex items-center mb-4"><div><div class="font-semibold text-[14px]">Match rules</div>
        <div class="text-[12px] text-muted">Evaluated top-to-bottom. The first rule that matches a pair wins.</div></div>
        <button data-act="add-rule" data-id="${rec.id}" class="ml-auto btn btn-ghost btn-sm">${icon('plus', 'w-3.5 h-3.5')}Add rule</button></div>
      <div class="space-y-2.5">
        ${rec.rules.slice().sort((a, b) => a.priority - b.priority).map((rl, i, arr) => ruleCard(rec, rl, i, arr.length, res)).join('')}
      </div>
      <div class="mt-5 card p-4">
        <div class="flex items-center gap-3"><div class="lbl">Auto-match threshold</div>
          <div class="mono text-[13px] font-semibold text-accent-ink ml-auto">${rec.threshold}%</div></div>
        <input type="range" min="50" max="100" value="${rec.threshold}" data-thresh="${rec.id}" class="w-full mt-3">
        <div class="text-[11.5px] text-muted mt-2">Matches at or above ${rec.threshold}% confidence are auto-applied; below become <span class="text-warn-ink font-medium">suggested</span> for review.</div>
      </div>
      ${matchWaterfall(rec, res)}
    </div>
    <div class="w-[300px] flex-none border-l border-line bg-surface overflow-y-auto p-5">
      <div class="lbl mb-3">Live simulation</div>
      <div class="flex flex-col items-center">${matchRing(res.rate, 140)}</div>
      <div class="mt-3 flex items-center justify-center gap-2 text-[12.5px]">
        <span class="text-muted">vs last run</span>
        <span class="mono font-semibold ${delta > 0 ? 'text-ok-ink' : delta < 0 ? 'text-bad-ink' : 'text-faint'}">${delta > 0 ? '+' : ''}${delta}%</span></div>
      <div class="mt-5 space-y-2">
        ${simStat('Matched', res.matched.length, 'ok')}
        ${simStat('Suggested', res.suggested.length, 'warn')}
        ${simStat('Breaks', res.breaks.length, 'bad')}
        ${simStat('Value at risk', fmtMoney(res.breakVal), 'muted')}
      </div>
      <div class="mt-5 pt-4 border-t border-line">
        ${dirty ? `<button data-act="run-recon" data-id="${rec.id}" class="btn btn-primary w-full justify-center">${icon('play', 'w-4 h-4')}Apply & run</button>
          <button data-act="revert-rules" data-id="${rec.id}" class="btn btn-ghost btn-sm w-full justify-center mt-2">Discard changes</button>`
          : `<div class="text-[12px] text-muted text-center flex items-center justify-center gap-1.5">${icon('check', 'w-4 h-4 text-ok')}In sync with last run</div>`}
      </div>
      <div class="mt-5 lbl mb-2">Matched by rule</div>
      <div class="space-y-1.5">${res.perRule.filter(p => p.count).map(({ rule, count }) => `<div class="flex items-center gap-2 text-[12px]"><span class="w-1.5 h-1.5 rounded-full ${rule.enabled ? 'bg-accent' : 'bg-faint'}"></span><span class="flex-1 truncate text-ink-soft">${esc(rule.name)}</span><span class="mono text-faint">${count}</span></div>`).join('') || '<div class="text-[12px] text-faint">No matches yet</div>'}</div>
    </div></div>`;
    }
    function simStat(l, v, t) {
      const col = t === 'ok' ? 'text-ok-ink' : t === 'warn' ? 'text-warn-ink' : t === 'bad' ? 'text-bad-ink' : 'text-ink';
      return `<div class="flex items-center justify-between px-3 h-9 rounded-md bg-sunken"><span class="text-[12.5px] text-muted">${l}</span><span class="mono text-[13px] font-semibold ${col}">${v}</span></div>`;
    }
    function matchWaterfall(rec, res) {
      const total = res.total || 1;
      const manualCount = res.matches.filter(m => m.ruleId === 'manual').length;
      const stages = [];
      if (manualCount) stages.push({ label: 'Manual matches', pairs: manualCount, color: 'var(--accent)' });
      rec.rules.slice().filter(r => r.enabled).sort((a, b) => a.priority - b.priority).forEach(rl => {
        const c = (res.perRule.find(p => p.rule.id === rl.id) || {}).count || 0;
        stages.push({ label: rl.name, pairs: c, conf: rl.confidence, color: rl.confidence >= rec.threshold ? 'var(--ok)' : 'var(--warn)' });
      });
      let rem = total;
      const rows = stages.map(s => { const consumed = s.pairs * 2; const after = rem - consumed; const r = { ...s, consumed, pct: consumed / total * 100, after }; rem = after; return r; });
      const breaks = res.breaks.length;
      const segs = [...rows.map(r => `<div title="${esc(r.label)}: ${r.pairs} pairs" style="width:${r.pct.toFixed(2)}%;background:${r.color}"></div>`),
      `<div title="Unmatched: ${breaks}" style="width:${(breaks / total * 100).toFixed(2)}%;background:var(--bad-soft)"></div>`].join('');
      return `<div class="mt-5 card overflow-hidden">
    <div class="flex items-center px-4 h-11 border-b border-line"><div class="font-semibold text-[13px]">Match waterfall</div>
      <div class="ml-auto text-[11.5px] text-muted">${total} records cascade through ${stages.length} tier${stages.length === 1 ? '' : 's'}</div></div>
    <div class="p-4">
      <div class="flex h-3 rounded-full overflow-hidden bg-sunken gap-px">${segs}</div>
      <div class="mt-4">
        ${rows.map((r, i) => `<div class="flex items-center gap-3 py-2 ${i ? 'border-t border-line-soft' : ''}">
          <div class="w-4 text-[11px] mono text-faint">${i + 1}</div>
          <span class="w-2 h-2 rounded-sm flex-none" style="background:${r.color}"></span>
          <div class="flex-1 min-w-0"><div class="text-[12.5px] font-medium truncate">${esc(r.label)}</div>
            <div class="text-[11px] text-faint">${r.conf != null ? `confidence ${r.conf} · ${r.conf >= rec.threshold ? 'auto-applied' : 'suggested'}` : 'manual confirmations'}</div></div>
          <div class="w-20 h-1.5 rounded-full bg-sunken overflow-hidden flex-none"><div class="h-full seg" style="width:${(r.after / total * 100).toFixed(1)}%;background:var(--faint)"></div></div>
          <div class="text-right w-24 flex-none"><div class="mono text-[12.5px] font-semibold">${r.pairs ? '+' + r.pairs : '0'} <span class="text-faint font-normal">pairs</span></div>
            <div class="text-[11px] text-faint mono">${r.after} left</div></div></div>`).join('')}
        <div class="flex items-center gap-3 py-2 border-t border-line">
          <div class="w-4"></div><span class="w-2 h-2 rounded-sm flex-none" style="background:var(--bad)"></span>
          <div class="flex-1"><div class="text-[12.5px] font-semibold text-bad-ink">Unmatched → breaks</div><div class="text-[11px] text-faint">need manual resolution</div></div>
          <div class="w-20 flex-none"></div>
          <div class="text-right w-24 flex-none mono text-[13px] font-semibold text-bad-ink">${breaks}</div></div>
      </div></div></div>`;
    }
    function ruleCard(rec, rl, i, total, res) {
      const editing = DB.ui.editRule === rl.id;
      const count = (res.perRule.find(p => p.rule.id === rl.id) || {}).count || 0;
      return `<div class="card ${rl.enabled ? '' : 'opacity-60'} ${editing ? 'ring-1 ring-accent' : ''}">
    <div class="flex items-center gap-3 px-3.5 py-3">
      <div class="flex flex-col text-faint">
        <button data-act="rule-up" data-id="${rec.id}" data-rule="${rl.id}" class="hover:text-ink ${i === 0 ? 'invisible' : ''}">${icon('up', 'w-3.5 h-3.5')}</button>
        <button data-act="rule-down" data-id="${rec.id}" data-rule="${rl.id}" class="hover:text-ink ${i === total - 1 ? 'invisible' : ''}">${icon('down', 'w-3.5 h-3.5')}</button></div>
      <div class="mono text-[12px] text-faint w-4">${rl.priority}</div>
      <div class="flex-1 min-w-0">
        <div class="font-semibold text-[13px] flex items-center gap-2">${esc(rl.name)}${count ? `<span class="text-[11px] font-medium text-muted mono">· ${count} matched</span>` : ''}</div>
        <div class="mt-1.5">${condChips(rl.cond)}</div></div>
      <div class="flex items-center gap-3">
        ${confBar(rl.confidence)}
        <button data-act="edit-rule" data-rule="${rl.id}" class="btn btn-ghost btn-sm">${editing ? 'Done' : 'Edit'}</button>
        <div class="switch" data-on="${rl.enabled}" data-act="toggle-rule" data-id="${rec.id}" data-rule="${rl.id}"></div></div>
    </div>
    ${editing ? ruleEditor(rec, rl) : ''}</div>`;
    }
    function ruleEditor(rec, rl) {
      const c = rl.cond;
      return `<div class="border-t border-line px-3.5 py-4 bg-canvas/60 grid grid-cols-4 gap-4 fade-in">
    <div><label class="lbl block mb-1.5">Rule name</label><input class="field" value="${esc(rl.name)}" data-rf="name" data-rule="${rl.id}"></div>
    <div><label class="lbl block mb-1.5">Reference</label><select class="field" data-rf="ref" data-rule="${rl.id}">
      <option value="exact" ${c.ref === 'exact' ? 'selected' : ''}>Exact match</option>
      <option value="fuzzy" ${c.ref === 'fuzzy' ? 'selected' : ''}>Fuzzy match</option>
      <option value="off" ${c.ref === 'off' ? 'selected' : ''}>Ignore</option></select></div>
    <div><label class="lbl block mb-1.5">Amount tolerance</label>
      <div class="flex gap-1.5"><select class="field" data-rf="amode" data-rule="${rl.id}" style="flex:1.2">
        <option value="exact" ${c.amount.mode === 'exact' ? 'selected' : ''}>Exact</option>
        <option value="pct" ${c.amount.mode === 'pct' ? 'selected' : ''}>Percent ±</option>
        <option value="abs" ${c.amount.mode === 'abs' ? 'selected' : ''}>Amount ±</option></select>
        <input class="field ${c.amount.mode === 'exact' ? 'opacity-40 pointer-events-none' : ''}" style="flex:1" type="number" step="0.1" value="${c.amount.mode === 'abs' ? (c.amount.value / 100) : c.amount.value}" data-rf="aval" data-rule="${rl.id}"></div></div>
    <div><label class="lbl block mb-1.5">Date window (± days)</label><input class="field" type="number" min="0" value="${c.date.days}" data-rf="date" data-rule="${rl.id}"></div>
    <div class="col-span-4 flex items-center gap-4">
      <div class="flex items-center gap-3 flex-1"><label class="lbl">Confidence</label>
        <input type="range" min="50" max="100" value="${rl.confidence}" data-rf="conf" data-rule="${rl.id}" class="flex-1 max-w-[220px]">
        <span class="mono text-[13px] font-semibold w-9">${rl.confidence}</span></div>
      <button data-act="del-rule" data-id="${rec.id}" data-rule="${rl.id}" class="btn btn-ghost btn-sm text-bad-ink">${icon('trash', 'w-3.5 h-3.5')}Delete rule</button></div></div>`;
    }
    // track whether current computed differs from last committed to show Apply state
    function engineChanged(rec) { if (!rec.lastRun) return true; const r = engine(rec); return r.rate !== rec.lastRun.rate || r.matched.length !== rec.lastRun.matched; }

    // ── Matches tab ──
    function recRow(rec, r, compact) {
      const kindCol = r.amount < 0 ? 'text-bad-ink' : 'text-ink';
      return `<div class="min-w-0"><div class="flex items-center gap-2"><span class="mono font-semibold ${kindCol} text-[13px]">${fmtMoney(r.amount, r.currency)}</span>
    <span class="text-[11px] text-faint mono">${fmtDate(r.date)}</span></div>
    <div class="text-[12px] text-ink-soft truncate">${esc(r.counterparty)} · <span class="text-muted">${esc(r.memo)}</span></div>
    ${r.reference ? `<div class="text-[11px] text-faint mono truncate">${esc(r.reference)}</div>` : ''}</div>`;
    }
    function reconMatches(rec, res) {
      const f = DB.filters.m || 'all';
      const rows = res.matches.filter(m => f === 'all' ? true : f === 'auto' ? m.confidence >= rec.threshold : m.confidence < rec.threshold);
      const A = id => rec.records.find(r => r.id === id), B = id => rec.records.find(r => r.id === id);
      const tab = (k, l, n) => `<button data-act="mfilter" data-f="${k}" class="btn btn-sm ${f === k ? 'btn-primary' : 'btn-ghost'}">${l}${n != null ? ` <span class="mono opacity-80">${n}</span>` : ''}</button>`;
      return `<div class="p-6">
    <div class="flex items-center gap-2 mb-4">${tab('all', 'All', res.matches.length)}${tab('auto', 'Auto-matched', res.matched.length)}${tab('sugg', 'Suggested', res.suggested.length)}
      <div class="ml-auto text-[12px] text-muted">${TYPE_META[rec.type].a} <span class="mono">A</span> &nbsp;↔&nbsp; <span class="mono">B</span> ${TYPE_META[rec.type].b}</div></div>
    <div class="space-y-2">
      ${rows.length ? rows.map(m => {
        const a = A(m.aId), b = B(m.bId); const sugg = m.confidence < rec.threshold;
        return `<div class="card px-4 py-3 grid items-center gap-3" style="grid-template-columns:1fr 150px 1fr auto">
          ${recRow(rec, a)}
          <div class="flex flex-col items-center gap-1">
            <div class="flex items-center gap-1.5 text-faint w-full"><span class="h-px flex-1 bg-line"></span>${icon('merge', 'w-3.5 h-3.5')}<span class="h-px flex-1 bg-line"></span></div>
            ${confBar(m.confidence)}
            <div class="text-[10.5px] text-faint truncate max-w-[140px]">${esc(m.ruleName)}</div></div>
          ${recRow(rec, b)}
          <div class="flex flex-col gap-1.5 items-end w-[120px]">${statusPill(sugg ? 'suggested' : 'matched')}
            ${sugg ? `<div class="flex gap-1"><button data-act="accept-sugg" data-id="${rec.id}" data-a="${m.aId}" data-b="${m.bId}" class="btn btn-sm btn-ghost text-ok-ink px-2">${icon('check', 'w-3.5 h-3.5')}</button>
              <button data-act="reject-sugg" data-id="${rec.id}" data-a="${m.aId}" data-b="${m.bId}" class="btn btn-sm btn-ghost text-bad-ink px-2">${icon('x', 'w-3.5 h-3.5')}</button></div>` : ''}</div>
        </div>`;
      }).join('')
          : emptyState('No matches in this view', 'Try running the reconciliation or adjusting rules.')}
    </div></div>`;
    }

    // ── Exceptions tab ──
    function breakReason(rec, r) {
      const map = {
        fee: 'Processor fee — book to expense', chargeback: 'Chargeback — investigate & book', refund: 'Refund not in ledger',
        'bank-fee': 'Bank fee — book to expense', interest: 'Interest earned — book to income',
        'in-transit': 'In transit — clears next period', outstanding: 'Outstanding — not yet cleared',
        unapplied: 'Unapplied cash on account', timing: 'Timing — posts next period',
        overdue: 'Overdue >60 days — send to collections', dispute: 'Disputed — route to disputes queue',
        unpaid: 'Bill approved, awaiting payment', nobill: 'Payment with no matching bill',
        tax: 'Tax withholding — book liability', reimb: 'Expense reimbursement — clear',
        shrinkage: 'Shrinkage / damage — book variance', noreceipt: 'Invoice with no goods receipt'
      };
      return map[r.kind] || (r.side === 'A' ? 'Present in source, missing in ledger' : 'Present in ledger, missing in source');
    }
    function reconExceptions(rec, res) {
      const breaks = res.breaks;
      return `<div class="p-6">
    <div class="flex items-center mb-4"><div><div class="font-semibold text-[14px]">${breaks.length} open break${breaks.length === 1 ? '' : 's'}</div>
      <div class="text-[12px] text-muted">${fmtMoney(res.breakVal)} unreconciled exposure</div></div>
      ${res.resolved.length ? `<div class="ml-auto text-[12px] text-muted">${res.resolved.length} resolved this period</div>` : ''}</div>
    ${breaks.length ? `<div class="card overflow-hidden"><table class="w-full text-[13px]"><thead>
      <tr class="lbl text-left border-b border-line"><th class="px-4 py-2 font-semibold">Source</th><th class="px-3 py-2 font-semibold">Date</th>
      <th class="px-3 py-2 font-semibold">Counterparty / memo</th><th class="px-3 py-2 font-semibold">Reference</th>
      <th class="px-3 py-2 font-semibold text-right">Amount</th><th class="px-3 py-2 font-semibold">Likely reason</th><th class="px-3 py-2 font-semibold text-right">Resolve</th></tr></thead><tbody>
      ${breaks.map(r => `<tr class="border-b border-line-soft row-hover">
        <td class="px-4 py-2.5"><span class="chip ${r.side === 'A' ? '' : 'bg-accent-soft text-accent-ink border-accent-soft'}">${r.side === 'A' ? TYPE_META[rec.type].aKind : TYPE_META[rec.type].bKind}</span></td>
        <td class="px-3 py-2.5 mono text-muted">${fmtDate(r.date)}</td>
        <td class="px-3 py-2.5"><div class="font-medium">${esc(r.counterparty)}</div><div class="text-[11px] text-faint">${esc(r.memo)}</div></td>
        <td class="px-3 py-2.5 mono text-faint text-[12px]">${esc(r.reference || '—')}</td>
        <td class="px-3 py-2.5 text-right mono font-semibold ${r.amount < 0 ? 'text-bad-ink' : ''}">${fmtMoney(r.amount, r.currency)}</td>
        <td class="px-3 py-2.5 text-[12px] text-muted"><div>${esc(breakReason(rec, r))}</div>${r.investigation ? `<div class="mt-1 text-warn-ink font-medium">Investigating · ${esc(r.investigation.owner)}</div>` : ''}</td>
        <td class="px-3 py-2.5"><div class="flex justify-end gap-1">
          <button data-act="resolve-break" data-id="${rec.id}" data-rec-item="${r.id}" data-mode="journal" class="btn btn-sm btn-ghost text-accent-ink">Journal entry</button>
          <button data-act="resolve-break" data-id="${rec.id}" data-rec-item="${r.id}" data-mode="writeoff" class="btn btn-sm btn-ghost">Write off</button>
          <button data-act="resolve-break" data-id="${rec.id}" data-rec-item="${r.id}" data-mode="investigate" class="btn btn-sm btn-ghost">${r.investigation ? 'Update case' : 'Investigate'}</button></div></td></tr>`).join('')}
    </tbody></table></div>`: emptyState('No open breaks 🎉', 'Every item is matched or resolved.')}
    ${res.resolved.length ? `<div class="mt-5"><div class="lbl mb-2">Resolved</div><div class="card divide-y divide-line-soft">
      ${res.resolved.map(r => `<div class="flex items-center gap-3 px-4 py-2.5 text-[12.5px]">${statusPill(r.resolution)}
        <span class="font-medium">${esc(r.counterparty)}</span><span class="text-faint">${esc(r.memo)}</span>${r.resolutionDetail ? `<span class="chip">${esc(r.resolutionDetail.status)} · ${esc(r.resolutionDetail.account)}</span>` : ''}
        <span class="ml-auto mono ${r.amount < 0 ? 'text-bad-ink' : 'text-ink-soft'}">${fmtMoney(r.amount, r.currency)}</span>

    function modalTransaction(rec, r) {

(r.currency)}</span></div></div><div class="flex justify-end gap-2"><button data-act="close-modal" class="btn btn-ghost">Close</button><button data-act="open-recon" data-id="${rec.id}" class="btn btn-primary">Open reconciliation</button></div></div>`);

    function toast(msg, tone = 'ok') {
      let container = $('#toast');
      if (!container) {
        container = document.createElement('div');
        container.id = 'toast';
        container.className = 'fixed top-5 right-5 z-[9999] flex flex-col items-end gap-2 pointer-events-none';
        document.body.appendChild(container);
      }
      const c = tone === 'ok' ? 'bg-[#0E9F6E] text-white shadow-2xl border border-emerald-700/30' : tone === 'warn' ? 'bg-warn text-white shadow-xl' : 'bg-bad text-white shadow-xl';
      const el = document.createElement('div'); el.className = `${c} px-4 py-2.5 rounded-lg text-[13px] font-semibold fade-in flex items-center gap-2.5 pointer-events-auto shadow-2xl`;
      el.innerHTML = `${icon('check', 'w-4 h-4 text-white')}<span class="whitespace-nowrap">${esc(msg)}</span>`;
      container.appendChild(el);
      setTimeout(() => {
        el.style.opacity = '0';
        el.style.transition = 'opacity 0.3s ease';
        setTimeout(() => el.remove(), 300);
      }, 3500);
    }

    // ═══════════════════════════════════════ view: ingestion hub ═══════════════════════════════════════
    // ── manual document upload ──
    function fmtSize(b) { if (b < 1024) return b + ' B'; if (b < 1048576) return Math.round(b / 1024) + ' KB'; return (b / 1048576).toFixed(1) + ' MB'; }
    function handleFiles(files, category, ref) {
      if (!files || !files.length) return;
      DB.docs = DB.docs || [];
      [...files].forEach(f => {
        DB.docs.unshift({ id: uid('doc'), name: f.name, size: f.size, type: f.type || 'file', category: category || 'other', ref: ref || null, uploadedBy: DB.user.name, at: todayISO() + 'T' + new Date().toTimeString().slice(0, 5) });
        if ((f.name || '').toLowerCase().endsWith('.csv') || f.type === 'text/csv') {
          const rd = new FileReader();
          rd.onload = () => { const { headers } = parseCSV(String(rd.result)); populateMappingsFromHeaders(headers, f.name); render(); };
          rd.readAsText(f);
        }
      });
      logAudit('Uploaded document', `${files.length} file(s)${ref ? ' · ' + ref : ''}${category ? ' · ' + category : ''}`);
      save(); render(); toast(`${files.length} document${files.length > 1 ? 's' : ''} uploaded`, 'ok');

    function dihData() {
      const q = (DB.filters.stgQ || '').toLowerCase(); const st = DB.filters.stgStatus || 'all';
      const jobFilter = DB.filters.stgJobId || 'all';
      const sort = DB.filters.stgSort || { field: 'txnId', dir: 'asc' };
      const staging = DB.staging || [];
      // Distinct uploaded files (in upload order, most recent first) driving the file picker below.
      const seenFiles = new Set();
      const files = [];
      staging.forEach(r => {
        const id = r.jobId || 'seed';
        if (seenFiles.has(id)) return;
        seenFiles.add(id);
        files.push({ id, label: r.sourceLabel || 'Sample seed data', count: staging.filter(x => (x.jobId || 'seed') === id).length });
      });
      let rows = staging.filter(r => {
        if (jobFilter !== 'all' && (r.jobId || 'seed') !== jobFilter) return false;
        if (st !== 'all' && r.status !== st) return false;
        if (!q) return true;
        return [r.txnId, r.date, r.counterparty, r.description, r.reference, String(r.amount), r.currency].join(' ').toLowerCase().includes(q);
      });
      rows = rows.slice().sort((a, b) => { let x = a[sort.field] || a.id, y = b[sort.field] || b.id; if (typeof x === 'string') { x = x.toLowerCase(); y = (y || '').toLowerCase(); } const c = x < y ? -1 : x > y ? 1 : 0; return sort.dir === 'asc' ? c : -c; });
      
      const pageSize = 10;
      const totalRows = rows.length;
      const totalPages = Math.max(1, Math.ceil(totalRows / pageSize));
      const currentPage = Math.min(Math.max(1, DB.filters.stgPage || 1), totalPages);
      const startRow = totalRows ? (currentPage - 1) * pageSize + 1 : 0;
      const endRow = Math.min(totalRows, currentPage * pageSize);
      const pagedRows = rows.slice((currentPage - 1) * pageSize, currentPage * pageSize);

      const th = (f, l, extra = '') => `<th class="px-3 py-2 font-semibold cursor-pointer select-none ${extra}" data-act="stg-sort" data-field="${f}"><span class="inline-flex items-center gap-1">${l}${sort.field === f ? `<span class="text-accent-ink">${sort.dir === 'asc' ? '↑' : '↓'}</span>` : ''}</span></th>`;
      const stpill = s => s === 'error' ? '<span class="chip bg-bad-soft text-bad-ink border-bad-soft">Error</span>' : s === 'mapped' ? '<span class="chip bg-ok-soft text-ok-ink border-ok-soft">Mapped</span>' : '<span class="chip">Staged</span>';

      const paginationHtml = `
        <div class="px-4 py-3 border-t border-line flex items-center justify-between bg-surface text-[12.5px] text-muted">
          <div class="flex items-center gap-2">
            <span>Showing <span class="font-medium text-ink">${startRow}–${endRow}</span> of <span class="font-medium text-ink">${totalRows}</span> rows</span>
            <span class="text-faint">·</span>
            <span>Page <span class="font-medium text-ink">${currentPage}</span> of <span class="font-medium text-ink">${totalPages}</span></span>
          </div>
          <div class="flex items-center gap-1">
            <button data-act="stg-page" data-page="${currentPage - 1}" class="btn btn-sm btn-ghost ${currentPage <= 1 ? 'opacity-40 pointer-events-none' : ''}">${icon('chevR', 'w-3.5 h-3.5 rotate-180')}Prev</button>
            <div class="flex items-center gap-1 px-1">${pageBtns.join('')}</div>
            <button data-act="stg-page" data-page="${currentPage + 1}" class="btn btn-sm btn-ghost ${currentPage >= totalPages ? 'opacity-40 pointer-events-none' : ''}">Next${icon('chevR', 'w-3.5 h-3.5')}</button>
          </div>
        </div>
      `;

      return `<div class="p-6">
    <div class="card px-4 py-3 mb-4 flex items-center gap-3 bg-ok-soft/40 border-ok/20">
      <span class="text-ok">${icon('check','w-5 h-5')}</span>
      <div><div class="font-semibold text-[13px]">Ready for reconciliation</div><div class="text-[11.5px] text-muted">Normalized records from Step 1 are available as canonical data for Side A / Side B matching.</div></div>
      <button data-act="goto" data-r="reconciliation" class="ml-auto btn btn-primary">Continue to Step 2 ${icon('arrowr','w-4 h-4')}</button>
    </div>
    <div class="flex items-center gap-2 mb-3">
      <div class="relative flex-1 max-w-md"><span class="absolute left-3 top-2 text-faint">${icon('search', 'w-4 h-4')}</span>
        <input data-stg-search class="field pl-9" value="${esc(DB.filters.stgQ || '')}" placeholder="Query staged rows — Transaction ID, counterparty, reference, amount"></div>
      <select data-stg-job class="field w-[220px]"><option value="all">All files (${staging.length})</option>${files.map(f => `<option value="${f.id}" ${jobFilter === f.id ? 'selected' : ''}>${esc(f.label)} (${f.count})</option>`).join('')}</select>
      <select data-stg-status class="field w-[150px]"><option value="all">All statuses</option><option value="staged" ${st === 'staged' ? 'selected' : ''}>Staged</option><option value="mapped" ${st === 'mapped' ? 'selected' : ''}>Mapped</option><option value="error" ${st === 'error' ? 'selected' : ''}>Error</option></select>
      <button data-act="stg-insert" class="btn btn-primary btn-sm ml-auto">${icon('plus', 'w-3.5 h-3.5')}Insert row</button>
    </div>
    <div class="text-[11.5px] text-muted mb-3 flex items-center gap-1.5">${icon('check', 'w-3.5 h-3.5 text-ok')}Secure staging area · ${totalRows} rows${jobFilter !== 'all' ? ` from ${esc((files.find(f => f.id === jobFilter) || {}).label || 'selected file')}` : ' staged across ' + files.length + ' file' + (files.length === 1 ? '' : 's')} · 10 rows per page</div>
    <div class="card overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-[13px]"><thead><tr class="lbl text-left border-b border-line">
      ${th('txnId', 'Transaction ID')}

      ${pagedRows.length ? pagedRows.map(r => `<tr class="border-b border-line-soft row-hover">

        <td class="px-3 py-2.5 text-right mono ${r.amount < 0 ? 'text-bad-ink' : 'font-medium'}">${fmtMoney(r.amount * 100, r.currency || 'USD')}</td>

        <td class="px-2 py-2.5 text-right"><button data-act="stg-del" data-id="${r.id}" class="text-faint hover:text-bad-ink">${icon('trash', 'w-4 h-4')}</button></td></tr>`).join('') : `<tr><td colspan="9" class="px-4 py-10 text-center text-muted">No rows match your query.</td></tr>`}
    </tbody></table></div>${paginationHtml}</div>
  </div>`;
    }

    function dihARPreview(rc, res, picker) {

          <button data-act="open-recon" data-id="${rc.id}" class="btn btn-primary">${icon('play','w-4 h-4')}Open reconciliation</button>

          <table class="w-full text-[13px]">
            <thead><tr class="lbl text-left border-b border-line"><th class="px-4 py-2">Invoice</th><th class="px-3 py-2">Customer</th><th class="px-3 py-2 text-right">Amount</th><th class="px-3 py-2">Payment</th><th class="px-4 py-2 text-right">Result</th></tr></thead>

            ${res.exceptions.slice(0,6).map(e => `<tr class="border-b border-line-soft row-hover"><td class="px-4 py-2.5 font-semibold">${e.type}</td><td class="px-3 py-2.5 text-muted">${esc(e.description)}</td><td class="px-3 py-2.5 text-right mono text-bad-ink">${fmtMoney(e.amount*100)}</td><td class="px-3 py-2.5">${statusPill('break')}</td><td class="px-4 py-2.5 text-right"><button data-act="open-recon" data-id="${rc.id}" class="btn btn-sm btn-ghost">Review</button></td></tr>`).join('') || `<tr><td colspan="5" class="px-4 py-8 text-center text-muted">No open exceptions.</td></tr>`}

            </select>`;
      if (rc.type === 'ar-reconciliation') return dihARPreview(rc, res, picker);
      const recRow = (m, status) => {
        const a = rc.records.find(x => x.id === m.aId), b = rc.records.find(x => x.id === m.bId);
        return `<tr class="border-b border-line-soft row-hover">
          <td class="px-4 py-2.5"><div class="font-semibold">${esc(a?.reference || a?.counterparty || 'Side A record')}</div><div class="text-[11px] text-faint">${esc(a?.date || '')} · ${esc(a?.counterparty || '')}</div></td>
          <td class="px-3 py-2.5 text-center text-faint">${icon('arrowr','w-4 h-4 inline')}</td>
          <td class="px-3 py-2.5"><div class="font-semibold">${esc(b?.reference || b?.counterparty || 'Side B record')}</div><div class="text-[11px] text-faint">${esc(b?.date || '')} · ${esc(b?.counterparty || '')}</div></td>
          <td class="px-3 py-2.5 text-right mono">${fmtMoney(Math.abs(a?.amount || 0))}</td>
          <td class="px-3 py-2.5">${statusPill(status)}</td>
          <td class="px-3 py-2.5"><div class="text-[12px] font-medium">${esc(m.ruleName)}</div><div class="text-[11px] text-faint">Confidence ${m.confidence}%</div></td>

        <td class="px-4 py-2.5"><div class="font-semibold">${esc(r.reference || r.counterparty || r.id)}</div><div class="text-[11px] text-faint">${r.side === 'A' ? 'Side A' : 'Side B'} · ${esc(r.date)}</div></td>
